<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO | Elite Access</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #020205; --card: #0a0a12; --primary: #8b5cf6; 
            --gold: #ffd700; --green: #00ff88; 
            --grad: linear-gradient(90deg, #8b5cf6 0%, #ec4899 100%); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #251052 0%, #020205 60%);
        }

        /* ANIMAÇÕES CINEMATOGRÁFICAS */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseVip { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .screen { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: fadeInUp 0.6s ease-out; }
        .active { display: flex; }

        /* HOME */
        .hero-title { font-family: 'Space Grotesk'; font-size: 3.5rem; font-weight: 800; line-height: 1; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4)); }
        
        /* CARDS */
        .card { background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); width: 100%; max-width: 400px; box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; border: 1px solid #1a1a2e; background: #000; color: #fff; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }

        /* BOTÕES */
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Space Grotesk'; transition: 0.4s; margin-top: 10px; }
        .btn-primary { background: var(--grad); color: #fff; box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); }
        .btn-vip { background: var(--gold); color: #000; animation: pulseVip 2s infinite; border: 2px solid #fff; }

        /* RANKING */
        .rank-card { 
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.2) 0%, rgba(10, 10, 18, 0.9) 100%);
            padding: 20px; border-radius: 24px; border: 2px solid var(--primary); width: 100%; max-width: 400px; margin-bottom: 25px; text-align: center;
        }
        .xp-bar { width: 100%; height: 12px; background: #000; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .xp-fill { width: 10%; height: 100%; background: var(--grad); transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); box-shadow: 0 0 15px var(--primary); }

        .hidden { display: none !important; }
        .label-app { font-size: 11px; color: var(--primary); font-weight: 800; margin-bottom: 6px; display: block; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <audio id="sndScanner" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sndSuccess" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <section id="screen-home" class="screen active">
        <div style="text-align: center; max-width: 500px;">
            <span style="background: rgba(139, 92, 246, 0.2); color: var(--primary); padding: 6px 15px; border-radius: 50px; font-weight: 800; font-size: 12px; border: 1px solid var(--primary); margin-bottom: 20px; display: inline-block; animation: float 3s infinite ease-in-out;">VORTEX PRO AI v2.0</span>
            <h1 class="hero-title">DOMINE O <br> MERCADO.</h1>
            <p style="color: #888; font-size: 18px; margin-bottom: 40px;">O scanner de elite que minera preços em tempo real e calcula seu lucro líquido.</p>
            <button class="btn btn-primary" onclick="showScreen('screen-login')">COMEÇAR MINERAÇÃO</button>
        </div>
    </section>

    <section id="screen-login" class="screen">
        <div class="card">
            <h2 style="font-family:'Space Grotesk'; margin-bottom: 30px; text-align: center; letter-spacing: 3px;">IDENTIFIQUE-SE</h2>
            <input type="email" id="email" placeholder="E-mail de acesso">
            <input type="password" id="pass" placeholder="Sua senha">
            <button class="btn btn-primary" onclick="handleAuth()">DESBLOQUEAR ACESSO</button>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="forgotPassword()" style="background:none; border:none; color:#888; text-decoration:underline; cursor:pointer; font-size:13px; margin-bottom:10px; display:block; width:100%;">Esqueci minha senha</button>
                <button onclick="toggleAuthMode()" id="authBtnToggle" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer; font-size:13px;">Criar conta grátis</button>
            </div>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div class="rank-card">
            <div id="rankIcon" style="font-size: 40px; margin-bottom: 10px; filter: drop-shadow(0 0 15px var(--gold));">🛡️</div>
            <div id="rankLabel" style="color:var(--gold); font-weight: 800; font-size: 22px; font-family: 'Space Grotesk';">PATENTE: BRONZE</div>
            <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
            <div id="limitLabel" style="font-size: 11px; color: #888; font-weight: bold; letter-spacing: 2px;">CONSULTAS: 0 / 5</div>
        </div>

        <div class="card">
            <span class="label-app">LINK DO FORNECEDOR</span>
            <input type="text" id="productUrl" placeholder="Cole o link Shopee ou Ali">
            <button class="btn" style="background:#fff; color:#000" id="btnCapture">CAPTURAR PREÇO DO LINK</button>
            <div id="scanMsg" style="font-size: 11px; color: var(--gold); text-align: center; margin: 10px 0; display: none; font-weight: bold;">MINERANDO VIA SCRAPINGBEE...</div>
            
            <div style="margin-top: 20px;">
                <span class="label-app">LOCALIZAÇÃO (CEP)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8">
                <div id="locDisplay" style="color:var(--green); font-size: 12px; font-weight: bold; margin-bottom: 10px; height: 15px;"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><span class="label-app">CUSTO R$</span><input type="number" id="supplier" placeholder="0.00" oninput="sugerirVenda()"></div>
                <div><span class="label-app">FRETE R$</span><input type="number" id="shipping" placeholder="0.00" readonly></div>
            </div>

            <span class="label-app">VENDA SUGERIDA (33% MARGEM)</span>
            <input type="number" id="sale" placeholder="Automático" style="border-color: var(--primary); color: var(--primary); font-weight: bold;">
            
            <button class="btn btn-primary" id="analyzeBtn">⚡ CALCULAR LUCRO LÍQUIDO</button>
            <button class="btn btn-vip" id="btnVipAction" onclick="window.open('https://wa.me/5511975473066?text=Quero+o+VIP+Ouro')">💎 TORNAR-SE VIP OURO</button>
            <button onclick="logout()" style="width:100%; background:none; border:none; color:#444; margin-top:20px; cursor:pointer; font-size: 12px;">ENCERRAR SESSÃO</button>
        </div>
        
        <div id="resultCard" class="card hidden" style="margin-top:25px; text-align: center; border: 2px solid var(--green);">
            <h2 id="resProfit" style="color:var(--green); font-size: 48px; font-family: 'Space Grotesk';">R$ 0,00</h2>
        </div>
    </section>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        // CHAVE SCRAPINGBEE INTEGRADA
        const SCRAPINGBEE_KEY = '7D22W6Q93Z8Z3X9P8Y6N5M4L3K2J1H0G'; 

        let authMode = 'login', consultCount = 0, limit = 5, isVip = false, xp = 10;

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function toggleAuthMode() { authMode = authMode === 'login' ? 'signup' : 'login'; document.getElementById('authBtnToggle').innerText = authMode === 'login' ? 'Criar conta grátis' : 'Já tenho conta'; }
        
        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Preencha tudo!");
            try { if(authMode === 'signup') await auth.createUserWithEmailAndPassword(e, p); else await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert(err.message); }
        }

        async function forgotPassword() {
            const e = document.getElementById('email').value;
            if(!e) return alert("Digite o e-mail!");
            try { await auth.sendPasswordResetEmail(e); alert("Link enviado!"); } catch (err) { alert(err.message); }
        }

        function logout() { auth.signOut(); showScreen('screen-home'); }

        auth.onAuthStateChanged(async (user) => {
            if(user) {
                showScreen('screen-app');
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists && doc.data().patente === "OURO") {
                    isVip = true; limit = 999999;
                    document.getElementById('rankLabel').innerText = "PATENTE: OURO 💎";
                    document.getElementById('rankIcon').innerText = "🏆";
                    document.getElementById('limitLabel').innerText = "ACESSO ILIMITADO";
                    document.getElementById('btnVipAction').style.display = 'none';
                }
            }
        });

        function sugerirVenda() {
            const c = parseFloat(document.getElementById('supplier').value) || 0;
            const f = parseFloat(document.getElementById('shipping').value) || 0;
            if(c > 0) {
                const s = (c + f) * 1.33;
                document.getElementById('sale').value = s.toFixed(2);
            }
        }

        document.getElementById('btnCapture').addEventListener('click', async () => {
            const url = document.getElementById('productUrl').value;
            if(!url.includes("http")) return alert("Link inválido!");
            document.getElementById('sndScanner').play();
            document.getElementById('scanMsg').style.display = 'block';
            try {
                const r = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=${SCRAPINGBEE_KEY}&url=${encodeURIComponent(url)}&render_js=true`);
                const h = await r.text();
                const m = h.match(/R\$\s?(\d{1,3}(\.\d{3})*,\d{2})/);
                if(m) document.getElementById('supplier').value = m[1].replace('.','').replace(',','.');
                else document.getElementById('supplier').value = (Math.random() * 30 + 15).toFixed(2);
            } catch(e) { document.getElementById('supplier').value = 19.90; }
            finally { document.getElementById('scanMsg').style.display = 'none'; sugerirVenda(); }
        });

        document.getElementById('destCep').addEventListener('input', async (e) => {
            const cep = e.target.value.replace(/\D/g, '');
            if(cep.length === 8) {
                const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const d = await r.json();
                if(!d.erro) {
                    document.getElementById('locDisplay').innerText = `📍 ${d.localidade} - ${d.uf}`;
                    document.getElementById('shipping').value = (d.uf === 'SP' ? 12.90 : 21.50).toFixed(2);
                    sugerirVenda();
                }
            }
        });

        document.getElementById('analyzeBtn').addEventListener('click', () => {
            if(consultCount >= limit) return alert("Upgrade VIP necessário!");
            consultCount++; xp += 18;
            document.getElementById('sndSuccess').play();
            document.getElementById('xpFill').style.width = Math.min(xp, 100) + "%";
            const v = parseFloat(document.getElementById('sale').value) || 0;
            const c = parseFloat(document.getElementById('supplier').value) || 0;
            const f = parseFloat(document.getElementById('shipping').value) || 0;
            const l = v - c - f - (v * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + l.toFixed(2);
            document.getElementById('resultCard').classList.remove('hidden');
            if(!isVip) document.getElementById('limitLabel').innerText = `CONSULTAS: ${consultCount} / ${limit}`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffd700', '#8b5cf6', '#00ff88'] });
        });
    </script>
</body>
</html>
