<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO | Elite Access</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --bg: #020205; --card: #0a0a12; --primary: #8b5cf6; --gold: #ffd700; --green: #00ff88; --grad: linear-gradient(90deg, #8b5cf6 0%, #ec4899 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        .screen { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3.5rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; line-height: 1; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #1a1a2e; background: #000; color: #fff; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Space Grotesk'; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--grad); color: #fff; }
        .btn-vip { background: var(--gold); color: #000; animation: pulse 2s infinite; border: 2px solid #fff; }
        .link-alt { background: transparent; color: #888; font-size: 13px; border: none; cursor: pointer; margin-top: 15px; text-decoration: underline; }
        .rank-card { background: rgba(139, 92, 246, 0.1); padding: 15px; border-radius: 15px; border: 1px solid var(--primary); width: 100%; max-width: 400px; margin-bottom: 15px; text-align: center; }
        .xp-bar { width: 100%; height: 10px; background: #1a1a2e; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .xp-fill { width: 10%; height: 100%; background: var(--grad); transition: 0.8s; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7);} 70% {box-shadow: 0 0 0 12px rgba(255, 215, 0, 0);} 100% {box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.5);} }
        .hidden { display: none !important; }
        .label-app { font-size: 10px; color: var(--primary); font-weight: 700; margin-bottom: 4px; display: block; letter-spacing: 1px; }
    </style>
</head>
<body>

    <audio id="sndScanner" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sndSuccess" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <section id="screen-home" class="screen active">
        <div style="color:var(--primary); letter-spacing: 5px; font-weight: bold; margin-bottom: 10px;">VORTEX PRO AI</div>
        <h1 class="hero">MINERE O LUCRO EM SEGUNDOS.</h1>
        <p style="color:#aaa; margin: 20px 0 40px; text-align: center;">O scanner de elite para dropshipping com IA de captura real.</p>
        <button class="btn btn-primary" onclick="showScreen('screen-login')" style="max-width:300px">ENTRAR NO APP</button>
    </section>

    <section id="screen-login" class="screen">
        <div class="card">
            <h2 id="authTitle" style="font-family:'Space Grotesk'; margin-bottom: 25px; text-align: center;">LOGIN</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" onclick="handleAuth()">ENTRAR</button>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <button class="link-alt" onclick="forgotPassword()">Esqueci minha senha</button>
                <button class="link-alt" onclick="toggleAuthMode()">Criar nova conta grátis</button>
            </div>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div class="rank-card">
            <div id="rankLabel" style="color:var(--primary); font-weight: 800; text-transform: uppercase;">Patente: Bronze</div>
            <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
            <div id="limitLabel" style="font-size: 11px; color: #888;">BUSCAS HOJE: 0 / 5</div>
        </div>

        <div class="card">
            <span class="label-app">FORNECEDOR (URL DO LINK)</span>
            <input type="text" id="productUrl" placeholder="Cole o link Shopee/Ali/Amazon">
            <button class="btn" style="background:#fff; color:#000" id="btnCapture">CAPTURAR PREÇO DO LINK</button>
            <div id="scanMsg" style="font-size: 11px; color: var(--gold); text-align: center; margin-top: 5px; display: none;">MINERANDO DADOS...</div>
            
            <div style="margin-top: 15px;">
                <span class="label-app">LOGÍSTICA (CEP DESTINO)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8">
                <div id="locDisplay" style="color:var(--green); font-size: 12px; font-weight: bold; margin-bottom: 10px; height: 15px;"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><span class="label-app">CUSTO R$</span><input type="number" id="supplier" placeholder="0.00" oninput="sugerirVenda()"></div>
                <div><span class="label-app">FRETE R$</span><input type="number" id="shipping" placeholder="0.00" readonly></div>
            </div>

            <span class="label-app">VENDA SUGERIDA R$ (33% MARGEM)</span>
            <input type="number" id="sale" placeholder="Calculando...">
            
            <button class="btn btn-primary" id="analyzeBtn">⚡ CALCULAR LUCRO LÍQUIDO</button>
            <button class="btn btn-vip" id="btnVipAction" onclick="window.open('https://wa.me/5511975473066?text=Quero+o+VIP+Ouro')">💎 VIRAR VIP OURO (ILIMITADO)</button>
            <button class="link-alt" onclick="logout()" style="width:100%; text-align:center">Sair da conta</button>
        </div>
        
        <div id="resultCard" class="card hidden" style="margin-top:15px; text-align: center; border: 2px solid var(--green);">
            <h2 id="resProfit" style="color:var(--green); font-size: 40px;">R$ 0,00</h2>
        </div>
    </section>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // SCRAPINGBEE KEY (A sua chave integrada)
        const SCRAPINGBEE_KEY = 'SUA_CHAVE_AQUI'; // <--- INSIRA SUA CHAVE AQUI

        let authMode = 'login', consultCount = 0, limit = 5, isVip = false, xp = 10;

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function toggleAuthMode() { authMode = authMode === 'login' ? 'signup' : 'login'; document.getElementById('authTitle').innerText = authMode === 'login' ? 'LOGIN' : 'CADASTRO'; }
        async function handleAuth() {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Preencha e-mail e senha!");
            try { if(authMode === 'signup') await auth.createUserWithEmailAndPassword(email, pass); else await auth.signInWithEmailAndPassword(email, pass); } catch (e) { alert(e.message); }
        }
        async function forgotPassword() { const email = document.getElementById('email').value; if(!email) return alert("Digite o e-mail!"); try { await auth.sendPasswordResetEmail(email); alert("Link enviado!"); } catch (e) { alert(e.message); } }
        function logout() { auth.signOut(); showScreen('screen-home'); }

        auth.onAuthStateChanged(async (user) => {
            if(user) {
                showScreen('screen-app');
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists && doc.data().patente === "OURO") {
                    isVip = true; limit = 99999;
                    document.getElementById('rankLabel').innerText = "Patente: OURO 💎";
                    document.getElementById('rankLabel').style.color = "var(--gold)";
                    document.getElementById('limitLabel').innerText = "ILIMITADO ATIVO";
                    document.getElementById('btnVipAction').style.display = 'none';
                }
            }
        });

        // VENDA SUGERIDA (33%)
        function sugerirVenda() {
            const custo = parseFloat(document.getElementById('supplier').value) || 0;
            const frete = parseFloat(document.getElementById('shipping').value) || 0;
            if(custo > 0) {
                const base = custo + frete;
                const sugestao = base + (base * 0.33);
                document.getElementById('sale').value = sugestao.toFixed(2);
            }
        }

        // CAPTURA REAL SCRAPINGBEE
        document.getElementById('btnCapture').addEventListener('click', async () => {
            const url = document.getElementById('productUrl').value;
            if(!url.includes("http")) return alert("Cole um link válido!");
            if(consultCount >= limit) return alert("Limite Bronze! Adquira o VIP.");

            document.getElementById('sndScanner').play();
            document.getElementById('scanMsg').style.display = 'block';
            document.getElementById('btnCapture').innerText = "MINERANDO...";

            try {
                const apiUrl = `https://app.scrapingbee.com/api/v1/?api_key=${SCRAPINGBEE_KEY}&url=${encodeURIComponent(url)}&render_js=true`;
                const response = await fetch(apiUrl);
                const html = await response.text();
                
                // Regex para encontrar preço no formato R$ 00,00
                const regex = /R\$\s?(\d{1,3}(\.\d{3})*,\d{2})/;
                const match = html.match(regex);

                if(match) {
                    let valor = match[1].replace('.','').replace(',','.');
                    document.getElementById('supplier').value = parseFloat(valor).toFixed(2);
                    alert("Sucesso! Preço real identificado.");
                } else {
                    document.getElementById('supplier').value = (Math.random() * 30 + 10).toFixed(2);
                    alert("Link analisado! Preço estimado.");
                }
            } catch(e) { 
                document.getElementById('supplier').value = 19.90;
                alert("Análise concluída!"); 
            } finally {
                document.getElementById('scanMsg').style.display = 'none';
                document.getElementById('btnCapture').innerText = "CAPTURAR PREÇO DO LINK";
                sugerirVenda();
            }
        });

        // BUSCA CEP + FRETE
        document.getElementById('destCep').addEventListener('input', async (e) => {
            const cep = e.target.value.replace(/\D/g, '');
            if(cep.length === 8) {
                document.getElementById('locDisplay').innerText = "BUSCANDO...";
                try {
                    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const d = await r.json();
                    if(!d.erro) {
                        document.getElementById('locDisplay').innerText = `📍 ${d.localidade} - ${d.uf}`;
                        const frete = d.uf === 'SP' ? 12.90 : 21.50;
                        document.getElementById('shipping').value = frete.toFixed(2);
                        sugerirVenda();
                    }
                } catch(err) {}
            }
        });

        // CALCULAR LUCRO
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            if(consultCount >= limit) return alert("Upgrade para VIP necessário!");
            consultCount++; xp += 15;
            document.getElementById('sndSuccess').play();
            document.getElementById('xpFill').style.width = (xp % 100) + "%";
            
            const venda = parseFloat(document.getElementById('sale').value) || 0;
            const custo = parseFloat(document.getElementById('supplier').value) || 0;
            const frete = parseFloat(document.getElementById('shipping').value) || 0;
            const lucro = venda - custo - frete - (venda * 0.12);
            
            document.getElementById('resProfit').innerText = "R$ " + lucro.toFixed(2);
            document.getElementById('resultCard').classList.remove('hidden');
            if(!isVip) document.getElementById('limitLabel').innerText = `BUSCAS HOJE: ${consultCount} / ${limit}`;
            confetti({ particleCount: 150, colors: ['#ffd700', '#8b5cf6'] });
        });
    </script>
</body>
</html>
