<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=0.8,maximum-scale=1,user-scalable=no">
    <title>VORTEX PRO AI | Sistema de Patentes</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --bg:#020205; --card:rgba(10, 10, 25, .95); --primary:#7c3aed; --gold:#fbbf24; --green:#10b981; --cyan:#06b6d4; --silver:#94a3b8; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
        body { font-family:'Rajdhani', sans-serif; background:var(--bg); color:#fff; min-height:100vh; overflow-x:hidden; position:relative; }

        .aurora { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; background:radial-gradient(circle at 20% 20%, rgba(124, 58, 237, .25) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(6, 182, 212, .2) 0%, transparent 40%); animation:auroraMove 20s infinite; }
        @keyframes auroraMove { 0%,100% { transform:scale(1); opacity:.8; } 50% { transform:scale(1.1); opacity:1; } }
        .grid-bg { position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px); background-size:30px 30px; z-index:-1; }

        .container { max-width:420px; margin: 0 auto; padding:20px; position:relative; }
        .logo { font-family:'Orbitron', sans-serif; font-size:26px; font-weight:900; text-align:center; margin:25px 0; text-shadow:0 0 15px var(--primary); letter-spacing:4px; color:#fff; }

        .card { background:var(--card); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 20px; padding: 22px; margin-bottom: 20px; backdrop-filter: blur(25px); box-shadow:0 10px 40px rgba(0,0,0,0.6); position:relative; }
        .label { font-size:10px; color:var(--cyan); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; display:block; font-family:'Orbitron'; }
        input { width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border: 1px solid #1e1e30; background:rgba(0,0,0,0.7); color:#fff; font-size:16px; transition:0.3s; }
        
        .btn { width:100%; padding:18px; border-radius:12px; border:none; font-weight:800; cursor:pointer; text-transform:uppercase; font-family:'Orbitron'; transition:0.3s; display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-gold { background:var(--gold); color:#000; margin-top:10px; }
        .btn-locked { background: #1e1e30 !important; color: #444 !important; cursor: not-allowed; border: 1px dashed #444; }
        
        #rankBadge { padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 900; margin-bottom: 10px; display: inline-block; }
        .rank-gold { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
        .rank-bronze { background: #cd7f32; color: #fff; box-shadow: 0 0 15px #cd7f32; }

        .hidden { display:none!important; }
        .switch-auth { text-align: center; font-size: 12px; color: var(--cyan); margin-top: 15px; cursor: pointer; text-decoration: underline; }
        #locDisplay { font-size: 13px; color: var(--green); margin:-10px 0 15px; font-weight: 700; padding: 12px; background: rgba(16, 185, 129, 0.1); border-radius: 10px; border-left: 4px solid var(--green); }
        .result-value { font-family:'Orbitron'; font-size:38px; color:var(--green); text-align:center; margin:15px 0; }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="logo">VORTEX PRO AI</div>

        <section id="screen-auth">
            <div id="auth-login" class="card">
                <span class="label">Operador Autorizado</span>
                <input type="email" id="login-email" placeholder="E-mail">
                <input type="password" id="login-pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleLogin()">🔐 ENTRAR</button>
                <div class="switch-auth" onclick="toggleAuth(true)">NÃO TEM CONTA? CADASTRE-SE</div>
            </div>
            <div id="auth-register" class="card hidden">
                <span class="label">Criar Nova Conta</span>
                <input type="email" id="reg-email" placeholder="E-mail">
                <input type="password" id="reg-pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleRegister()">💎 CRIAR ACESSO BRONZE</button>
                <div class="switch-auth" onclick="toggleAuth(false)">JÁ TEM CONTA? LOGIN</div>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div class="card" style="text-align: center;">
                <div id="rankBadge" class="rank-bronze">BRONZE</div>
                <div id="rankMessage" style="font-size: 11px; opacity: 0.7; margin-top: 5px;">Funcionalidades Limitadas</div>
            </div>

            <div class="card">
                <span class="label">Scanner de Fornecedor</span>
                <input type="url" id="productUrl" placeholder="Link do Fornecedor">
                <button class="btn btn-primary" id="btnMiner" onclick="checkPermission()">⚡ ESCANEAR PRODUTO</button>
                
                <span class="label" style="margin-top:20px">Logística (CEP)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)">
                <div id="locDisplay">Aguardando CEP...</div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div><span class="label">Custo Unit.</span><input type="text" id="supplier" placeholder="0,00" oninput="calcSuggest()"></div>
                    <div><span class="label">Frete Base</span><input type="text" id="shipping" value="0,00" readonly style="color:var(--cyan)"></div>
                </div>

                <span class="label">Venda Sugerida (45% Margem)</span>
                <input type="text" id="sale" style="border-color:var(--gold); color:var(--gold); font-weight:900">

                <button class="btn btn-gold" onclick="calcular()">🚀 CALCULAR LUCRO</button>
            </div>

            <div id="resultCard" class="card hidden">
                <div id="resProfit" class="result-value">R$ 0,00</div>
                <button class="btn" style="background:#25d366; color:#fff;" id="btnSupport">💬 SUPORTE VIP</button>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:rgba(255,255,255,0.1); width:100%; cursor:pointer; font-size:10px; margin-top:10px;">SAIR</button>
        </section>
    </div>

    <script>
        const firebaseConfig = { apiKey:"AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain:"vortexpro1021.firebaseapp.com", projectId:"vortexpro1021", storageBucket:"vortexpro1021.firebasestorage.app", messagingSenderId:"403000271858", appId:"1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userRank = "BRONZE";

        function toggleAuth(showReg) {
            document.getElementById('auth-login').classList.toggle('hidden', showReg);
            document.getElementById('auth-register').classList.toggle('hidden', !showReg);
        }

        async function handleLogin() {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert("Login Falhou."); }
        }

        async function handleRegister() {
            const e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value;
            try {
                const cred = await firebase.auth().createUserWithEmailAndPassword(e, p);
                await db.collection("users").doc(cred.user.uid).set({ patente: "BRONZE", email: e });
                alert("Bem-vindo ao Vortex Bronze!");
            } catch(err) { alert("Erro ao cadastrar."); }
        }

        firebase.auth().onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) {
                    userRank = doc.data().patente;
                    const badge = document.getElementById('rankBadge');
                    badge.innerText = userRank;
                    badge.className = userRank === "OURO" ? "rank-gold" : "rank-bronze";
                    document.getElementById('rankMessage').innerText = userRank === "OURO" ? "Acesso Total Liberado" : "Funcionalidades Limitadas";
                    
                    // Ajusta Suporte
                    const supportBtn = document.getElementById('btnSupport');
                    const msg = encodeURIComponent(`Olá Junior, sou operador ${userRank} e preciso de ajuda.`);
                    supportBtn.onclick = () => window.open(`https://wa.me/5511975473066?text=${msg}`);
                }
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
            }
        });

        // TRAVA DE PERMISSÃO
        function checkPermission() {
            if(userRank === "BRONZE") {
                alert("❌ FUNÇÃO BLOQUEADA: O Scanner automático é exclusivo para patentes OURO. Digite o custo manualmente.");
            } else {
                capturePrice(); // Só roda se for Ouro
            }
        }

        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnMiner');
            btn.innerText = "⛏️ MINERANDO...";
            try {
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&wait=8000&premium_proxy=true`);
                const html = await res.text();
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})|(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) { 
                    document.getElementById('supplier').value = match[0].replace('R$', '').trim(); 
                    calcSuggest();
                }
            } catch (e) { alert("Erro de sinal."); } finally { btn.innerText = "⚡ ESCANEAR PRODUTO"; }
        }

        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                    const data = await res.json();
                    const json = JSON.parse(data.contents);
                    if(!json.erro) {
                        display.innerHTML = `📍 ${json.localidade}, ${json.uf} ✅`;
                        const fretes = { SP: "12,90", RJ: "15,80", BA: "21,50", MG: "18,90" };
                        document.getElementById('shipping').value = (fretes[json.uf] || "23,80").replace('.',',');
                        calcSuggest();
                    }
                } catch(e) { display.innerText = "📍 ROTA REGIONAL"; document.getElementById('shipping').value = "19,90"; calcSuggest(); }
            }
        }

        function n(v) { return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0; }
        function calcSuggest() {
            const s = n(document.getElementById('supplier').value), f = n(document.getElementById('shipping').value);
            if(s > 0) {
                const sugerido = (s + f) * 1.45;
                document.getElementById('sale').value = sugerido.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }
        }

        function calcular() {
            const v = n(document.getElementById('sale').value), s = n(document.getElementById('supplier').value), f = n(document.getElementById('shipping').value);
            const lucro = v - s - f - (v * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 200, spread: 80, origin: { y: 0.8 } });
        }
        function logout() { firebase.auth().signOut().then(() => location.reload()); }
    </script>
</body>
</html>
