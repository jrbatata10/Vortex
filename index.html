<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO AI | Elite Operations</title>
    
    <!-- Firebase SDK (v8 compatível) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #030305; --card: #080811; --primary: #7c3aed; 
            --gold: #f59e0b; --green: #10b981; --red: #ef4444;
            --blue: #0046ff; --blue-dark: #001a4d;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
        }
        
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg); color: #fff; 
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #030305 75%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        
        .logo { 
            font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 800; 
            background: linear-gradient(135deg, #fff, var(--primary)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin: 30px 0; 
        }
        
        .screen { 
            width: 100%; display: none; flex-direction: column; max-width: 400px; 
            animation: slideUp 0.4s ease; 
        }
        
        .active { display: flex; }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .card { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(124, 58, 237, 0.2); width: 100%; 
            margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
        }
        
        .label { 
            font-size: 11px; color: #6366f1; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1.5px; 
            margin-bottom: 8px; display: block; 
        }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #1e1e30; background: #000; color: #fff; 
            font-size: 16px; font-family: 'Space Grotesk'; transition: 0.3s; 
        }
        
        input:focus { outline: none; border-color: var(--primary); }
        input.error { border-color: var(--red); }
        
        .btn { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: 700; cursor: pointer; font-family: 'Space Grotesk'; 
            text-transform: uppercase; transition: 0.3s; position: relative;
        }
        
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-primary { 
            background: var(--primary); color: white; 
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); 
        }
        
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124, 58, 237, 0.5); }
        
        .btn-extract { background: #fff; color: #000; margin-bottom: 12px; }
        .btn-extract:hover:not(:disabled) { background: #f0f0f0; }
        
        #rankCard { 
            border-color: var(--gold); 
            background: rgba(245, 158, 11, 0.05); 
            text-align: center; 
        }
        
        #locDisplay { 
            font-size: 12px; color: var(--green); font-weight: 700; 
            margin-top: -10px; margin-bottom: 15px; min-height: 18px; 
        }
        
        .result-value { 
            font-family: 'Space Grotesk'; font-size: 42px; font-weight: 700; 
            color: var(--green); text-align: center; margin: 10px 0; 
        }
        
        .hidden { display: none !important; }

        /* Banner Nuvemshop */
        .banner-nuvem {
            width: 100%; padding: 15px; border-radius: 12px; 
            background: linear-gradient(90deg, var(--blue), var(--blue-dark));
            display: flex; align-items: center; gap: 12px; 
            cursor: pointer; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        
        .banner-nuvem:hover { transform: scale(1.02); }
        
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 1s linear infinite; display: inline-block;
            vertical-align: middle; margin-right: 8px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--red);
            color: var(--red); padding: 12px 24px; border-radius: 8px;
            font-weight: 700; z-index: 1000; opacity: 0; transition: opacity 0.3s;
        }
        
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="logo">VORTEX PRO AI</div>

    <!-- Toast para erros -->
    <div id="toast" class="toast"></div>

    <!-- Tela de Login -->
    <section id="screen-login" class="screen active">
        <div class="card">
            <span class="label">Operador Autorizado</span>
            <input type="email" id="email" placeholder="E-mail" autocomplete="email">
            <input type="password" id="pass" placeholder="Senha" autocomplete="current-password">
            <button class="btn btn-primary" id="btnLogin" onclick="handleAuth()">ENTRAR NO TERMINAL</button>
        </div>
    </section>

    <!-- Tela Principal -->
    <section id="screen-app" class="screen">
        <div id="rankCard" class="card">
            <span id="rankLabel" style="color: var(--gold); font-weight: 700; font-family: 'Space Grotesk';">
                PATENTE: OURO 💎
            </span>
        </div>

        <div class="card">
            <span class="label">Scanner de Fornecedor</span>
            <input type="url" id="productUrl" placeholder="Link Shopee/AliExpress">
            <button class="btn btn-extract" id="btnExtract" onclick="capturePrice()">
                INICIAR MINERAÇÃO
            </button>
            
            <span class="label" style="margin-top: 10px;">Logística Regional (CEP)</span>
            <input type="text" id="destCep" placeholder="00000-000" maxlength="9" oninput="formatarCEP(this)">
            <div id="locDisplay"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <span class="label">Custo Unit.</span>
                    <input type="text" id="supplier" placeholder="0,00" oninput="atualizarSugestao()">
                </div>
                <div>
                    <span class="label">Frete (R$)</span>
                    <input type="text" id="shipping" value="0,00" readonly style="opacity: 0.6;">
                </div>
            </div>

            <span class="label">Preço Sugerido para Elite</span>
            <input type="text" id="sale" style="border-color: var(--primary); color: var(--primary); font-size: 20px;">
            
            <button class="btn btn-primary" id="btnCalc" onclick="calcular()">CALCULAR MARGEM LÍQUIDA</button>
        </div>

        <div id="resultCard" class="card hidden" style="border-color: var(--green);">
            <span class="label" style="text-align: center; color: var(--green);">Lucro por Venda</span>
            <div id="resProfit" class="result-value">R$ 0,00</div>
            
            <div class="banner-nuvem" onclick="window.open('https://www.nuvemshop.com.br/partners/vrtex-pro', '_blank', 'noopener,noreferrer')">
                <span style="font-size:24px;">🏢</span>
                <div style="text-align:left;">
                    <div style="font-size:10px; font-weight:800; color:#fff;">PARCEIRO ESTRATÉGICO</div>
                    <div style="font-size:13px; font-weight:700; color:#fff;">Escalar na Nuvemshop</div>
                </div>
            </div>
        </div>
        
        <button class="btn" onclick="logout()" style="background: transparent; border: 1px solid var(--red); color: var(--red); margin-top: 10px;">
            SAIR DO SISTEMA
        </button>
    </section>

    <script>
        // ==================== CONFIGURAÇÃO FIREBASE ====================
        // ⚠️ ALERTA DE SEGURANÇA: API Key exposta no frontend é insegura para produção
        // Considere usar Firebase Functions ou variáveis de ambiente
        const firebaseConfig = { 
            apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", 
            authDomain: "vortexpro1021.firebaseapp.com", 
            projectId: "vortexpro1021", 
            storageBucket: "vortexpro1021.firebasestorage.app", 
            messagingSenderId: "403000271858", 
            appId: "1:403000271858:web:7a8716548ee0a1b822016b" 
        };
        
        // Inicialização segura
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ==================== UTILITÁRIOS ====================
        const $ = id => document.getElementById(id);
        
        function showToast(msg, type = 'error') {
            const toast = $('toast');
            toast.textContent = msg;
            toast.style.borderColor = type === 'success' ? 'var(--green)' : 'var(--red)';
            toast.style.color = type === 'success' ? 'var(--green)' : 'var(--red)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setLoading(btnId, loading) {
            const btn = $(btnId);
            btn.disabled = loading;
            if (loading) {
                btn.dataset.originalText = btn.innerText;
                btn.innerHTML = '<span class="spinner"></span> Processando...';
            } else {
                btn.innerText = btn.dataset.originalText || btn.innerText;
            }
        }

        // ==================== AUTENTICAÇÃO ====================
        async function handleAuth() {
            const email = $('email').value.trim();
            const pass = $('pass').value;
            
            if (!email || !pass) {
                showToast('Preencha todos os campos');
                return;
            }
            
            setLoading('btnLogin', true);
            
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch(err) {
                console.error('Auth error:', err);
                const msg = err.code === 'auth/user-not-found' ? 'Operador não cadastrado' :
                           err.code === 'auth/wrong-password' ? 'Credenciais inválidas' :
                           'Acesso Negado. Contate o administrador';
                showToast(msg);
            } finally {
                setLoading('btnLogin', false);
            }
        }

        // Enter para login
        $('pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAuth();
        });

        async function logout() {
            try {
                await auth.signOut();
                $('screen-app').classList.remove('active');
                $('screen-login').classList.add('active');
                $('email').value = '';
                $('pass').value = '';
            } catch(err) {
                console.error('Logout error:', err);
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await db.collection("users").doc(user.uid).get();
                    const patente = doc.exists ? (doc.data().patente || "OURO") : "OURO";
                    $('rankLabel').innerText = `STATUS: ${patente} 💎`;
                    $('screen-login').classList.remove('active');
                    $('screen-app').classList.add('active');
                } catch(err) {
                    console.error('Data fetch error:', err);
                    showToast('Erro ao carregar dados do operador');
                }
            }
        });

        // ==================== CEP E LOGÍSTICA ====================
        function formatarCEP(el) {
            let v = el.value.replace(/\D/g, '').slice(0, 8);
            if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
            el.value = v;
            validarCEP(v.replace('-', ''));
        }

        async function validarCEP(cep) {
            const display = $('locDisplay');
            
            if (cep.length !== 8) {
                display.innerText = '';
                return;
            }
            
            display.innerText = "🔍 Localizando...";
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await res.json();
                
                if (!data.erro) {
                    display.innerHTML = `📍 ${data.localidade} - ${data.uf}`;
                    const frete = data.uf === 'SP' ? 12.90 : 22.50;
                    $('shipping').value = frete.toFixed(2).replace('.', ',');
                    atualizarSugestao();
                } else {
                    display.innerText = "❌ CEP não encontrado";
                    $('shipping').value = "0,00";
                }
            } catch(err) {
                console.error('CEP error:', err);
                display.innerText = "⚠️ Erro de conexão";
                $('shipping').value = "0,00";
            }
        }

        // ==================== CÁLCULOS E SCRAPING ====================
        function n(v) { 
            if (!v) return 0;
            return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0; 
        }
        
        function formatCurrency(val) {
            return val.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function atualizarSugestao() {
            const custo = n($('supplier').value);
            const frete = n($('shipping').value);
            
            if (custo > 0) {
                const sugerido = (custo + frete) * 1.33;
                $('sale').value = formatCurrency(sugerido);
            }
        }

        async function capturePrice() {
            const url = $('productUrl').value.trim();
            
            if (!url) {
                showToast('Insira um link de produto');
                return;
            }
            
            if (!url.match(/^https?:\/\//)) {
                showToast('URL inválida. Use http:// ou https://');
                return;
            }
            
            setLoading('btnExtract', true);
            
            try {
                // ⚠️ ALERTA: API Key exposta! Em produção, use um backend proxy
                const apiUrl = `https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true`;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const res = await fetch(apiUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const html = await res.text();
                
                // Regex melhorada para capturar preços
                const patterns = [
                    /R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/,
                    /R\$\s?(\d+,\d{2})/,
                    /class="[^"]*price[^"]*"[^>]*>.*?(\d+[\.,]\d{2})/i,
                    /data-price="(\d+[\.,]\d{2})"/
                ];
                
                let preco = null;
                for (const pattern of patterns) {
                    const match = html.match(pattern);
                    if (match) {
                        preco = match[1].replace('.', '').replace(',', '.');
                        break;
                    }
                }
                
                if (preco) {
                    $('supplier').value = parseFloat(preco).toFixed(2).replace('.', ',');
                    atualizarSugestao();
                    showToast('Preço extraído com sucesso!', 'success');
                } else {
                    showToast('Site protegido. Digite o preço manualmente');
                    $('supplier').focus();
                }
                
            } catch(err) {
                console.error('Scraping error:', err);
                showToast(err.name === 'AbortError' ? 'Timeout na conexão' : 'Erro ao minerar dados');
            } finally {
                setLoading('btnExtract', false);
            }
        }

        function calcular() {
            const venda = n($('sale').value);
            const custo = n($('supplier').value);
            const frete = n($('shipping').value);
            
            if (!venda || !custo) {
                showToast('Preencha preço de venda e custo');
                return;
            }
            
            // Cálculo: Lucro = Venda - Custo - Frete - Taxas (12%)
            const taxas = venda * 0.12;
            const lucro = venda - custo - frete - taxas;
            const margem = venda > 0 ? ((lucro / venda) * 100) : 0;
            
            $('resProfit').innerText = "R$ " + formatCurrency(lucro);
            $('resProfit').style.color = lucro > 0 ? 'var(--green)' : 'var(--red)';
            $('resultCard').classList.remove('hidden');
            
            // Scroll suave para resultado
            $('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            if (lucro > 0) {
                confetti({ 
                    particleCount: 150, 
                    spread: 70, 
                    origin: { y: 0.8 },
                    colors: ['#10b981', '#7c3aed', '#f59e0b']
                });
            }
        }

        // ==================== PROTEÇÃO CONTRA FECHAMENTO ACIDENTAL ====================
        window.addEventListener('beforeunload', (e) => {
            if ($('screen-app').classList.contains('active')) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
