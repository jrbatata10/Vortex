<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX PRO AI | ELITE v37.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --bg: #020205; --card: rgba(10, 10, 25, 0.9); --primary: #7c3aed; --gold: #fbbf24; --green: #10b981; --cyan: #06b6d4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; overflow: hidden; }

        /* DESIGN KIMI: AURORA E PARTICULAS */
        .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.2) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%); }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }

        .container { max-width: 420px; margin: 0 auto; padding: 20px; position: relative; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; text-align: center; margin: 20px 0; text-shadow: 0 0 10px var(--primary); letter-spacing: 4px; }

        .card { background: var(--card); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 20px; padding: 22px; margin-bottom: 20px; backdrop-filter: blur(15px); }
        .label { font-size: 10px; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; font-family: 'Orbitron'; }
        input { width: 100%; padding: 14px; margin-bottom: 14px; border-radius: 8px; border: 1px solid #1e1e30; background: rgba(0,0,0,0.6); color: #fff; font-size: 16px; }

        .btn { width: 100%; padding: 18px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; margin-top: 10px; }

        #locDisplay { font-size: 12px; color: var(--green); margin: -10px 0 15px; font-weight: 700; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; border-left: 3px solid var(--green); }
        .result-value { font-family: 'Orbitron'; font-size: 40px; color: var(--green); text-align: center; margin: 15px 0; }
        .hidden { display: none !important; }
        .footer-saas { font-size: 10px; color: #333; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="logo">VORTEX PRO AI</div>

        <section id="screen-login">
            <div class="card">
                <span class="label">Acesso SaaS Operacional</span>
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn btn-primary" onclick="handleAuth()">LOGIN ELITE</button>
            </div>
            <div class="footer-saas">Compliance Digify • Termos & Privacidade</div>
        </section>

        <section id="screen-app" class="hidden">
            <div class="card" style="text-align: center; border-color: var(--gold);">
                <div style="font-size: 22px; font-weight: 900; color: var(--gold); font-family: 'Orbitron';">OURO 💎</div>
            </div>

            <div class="card">
                <span class="label">Scanner de Link</span>
                <input type="url" id="productUrl" placeholder="Link do Fornecedor">
                <button class="btn btn-primary" id="btnMiner" onclick="capturePrice()">⚡ ESCANEAR PREÇO</button>
                
                <span class="label" style="margin-top: 20px;">Logística Universal (Qualquer Cidade)</span>
                <input type="text" id="destCep" placeholder="Digite o CEP" maxlength="8" oninput="validarCEP(this)">
                <div id="locDisplay">Aguardando coordenadas...</div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div><span class="label">Custo</span><input type="text" id="supplier" placeholder="0,00" oninput="calcSuggest()"></div>
                    <div><span class="label">Frete</span><input type="text" id="shipping" value="0,00" readonly></div>
                </div>

                <span class="label">Preço Sugerido (45% Margem)</span>
                <input type="text" id="sale" style="border-color: var(--gold); color: var(--gold);">

                <button class="btn btn-gold" onclick="calcular()">🚀 CALCULAR LUCRO</button>
            </div>

            <div id="resultCard" class="card hidden">
                <div id="resProfit" class="result-value">R$ 0,00</div>
                <button class="btn" style="background: #25d366;" onclick="window.open('https://wa.me/5511982755510')">💬 WHATSAPP SUPORTE</button>
            </div>
        </section>
    </div>

    <script>
        // FIREBASE SYNC
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert("Acesso Negado."); }
        }

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
            }
        });

        // MOTOR DE CEP UNIVERSAL
        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                display.innerText = "🔍 Localizando...";
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                    const data = await res.json();
                    const json = JSON.parse(data.contents);
                    if(!json.erro) {
                        display.innerHTML = `📍 ${json.localidade}, ${json.uf} ✅`;
                        document.getElementById('shipping').value = (json.uf === 'SP' ? "12,90" : "23,80");
                        calcSuggest();
                    } else { display.innerText = "❌ CEP não encontrado."; }
                } catch(e) { 
                    display.innerText = "📍 Rota Regional (Estimada)"; 
                    document.getElementById('shipping').value = "19,90"; 
                }
            }
        }

        // MOTOR DE MINERAÇÃO (SCRAPINGBEE)
        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnMiner');
            if(!url) return;
            btn.innerText = "⛏️ MINERANDO...";
            try {
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true&wait=5000`);
                const html = await res.text();
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})|(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) { 
                    document.getElementById('supplier').value = match[0].replace('R$', '').trim(); 
                    calcSuggest();
                }
            } catch (e) { alert("Site protegido. Digite o custo manualmente."); } finally { btn.innerText = "⚡ ESCANEAR PREÇO"; }
        }

        function n(v) { return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0; }
        
        function calcSuggest() {
            const s = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            if(s > 0) {
                const sugerido = (s + f) * 1.45; // 45% MARGEM
                document.getElementById('sale').value = sugerido.toFixed(2).replace('.', ',');
            }
        }

        function calcular() {
            const v = n(document.getElementById('sale').value);
            const s = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            const lucro = v - s - f - (v * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#7c3aed', '#fbbf24', '#10b981'] });
        }
    </script>
</body>
</html>
