<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=0.8,maximum-scale=1,user-scalable=no">
    <title>VORTEX PRO AI v6.5 ULTRA 🔥</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root{--bg:#020205;--card:rgba(10,10,25,.9);--primary:#7c3aed;--gold:#fbbf24;--green:#10b981;--cyan:#06b6d4;}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
        .aurora{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:radial-gradient(circle at 20% 20%,rgba(124,58,237,.25) 0%,transparent 40%),radial-gradient(circle at 80% 80%,rgba(6,182,212,.2) 0%,transparent 40%);animation:auroraMove 20s infinite}
        @keyframes auroraMove{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
        .container{max-width:420px;margin:0 auto;padding:20px}
        .logo{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;text-align:center;margin:25px 0;text-shadow:0 0 15px var(--primary);letter-spacing:4px;color:#fff}
        .logo span{color:var(--cyan)}
        .card{background:var(--card);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:22px;margin-bottom:20px;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,.6);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,transparent,transparent,var(--primary));animation:rotate 4s linear infinite;z-index:-1;opacity:.2}
        @keyframes rotate{100%{transform:rotate(360deg)}}
        .label{font-size:10px;color:var(--cyan);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:block;font-family:'Orbitron'}
        input{width:100%;padding:15px;margin-bottom:15px;border-radius:10px;border:1px solid #1e1e30;background:rgba(0,0,0,.7);color:#fff;font-size:16px;transition:.3s}
        input:focus{border-color:var(--cyan);box-shadow:0 0 15px rgba(6,182,212,.3);outline:none}
        .btn{width:100%;padding:18px;border-radius:12px;border:none;font-weight:800;cursor:pointer;text-transform:uppercase;font-family:'Orbitron';transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px}
        .btn-primary{background:var(--primary);color:#fff;box-shadow:0 5px 20px rgba(124,58,237,.4)}
        .btn-gold{background:var(--gold);color:#000;margin-top:10px;box-shadow:0 5px 20px rgba(251,191,36,.3)}
        .btn-whatsapp{background:#25d366;color:#fff;margin-top:15px;font-size:13px}
        #locDisplay{font-size:13px;color:var(--green);margin:-10px 0 15px;font-weight:700;padding:12px;background:rgba(16,185,129,0.1);border-radius:10px;border-left:4px solid var(--green)}
        .result-value{font-family:'Orbitron';font-size:38px;color:var(--green);text-align:center;margin:15px 0;text-shadow:0 0 20px var(--green)}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .hidden{display:none!important}
        .banner-ads{background:linear-gradient(90deg,#1e1e30,#2d1b4d);border:2px solid var(--gold);border-radius:15px;padding:15px;margin-bottom:20px;text-align:center;font-family:'Orbitron'}
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="container">
        <div class="logo">VORTEX<span>PRO</span> AI</div>
        
        <section id="screen-login">
            <div class="card">
                <span class="label">Acesso de Operador</span>
                <input type="email" id="email" placeholder="seu@email.com">
                <input type="password" id="pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleAuth()">🚀 ENTRAR NO TERMINAL</button>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div class="banner-ads">
                <div style="color:var(--gold);font-size:14px">OFERTA VIP ATIVA 🔥</div>
                <div style="font-size:10px;opacity:.8">MARGEM DE 45% CONFIGURADA</div>
            </div>

            <div class="card" style="text-align:center;border-color:var(--gold)">
                <div style="font-size:22px;font-weight:900;color:var(--gold);font-family:'Orbitron'">ELITE OURO 💎</div>
            </div>

            <div class="card">
                <span class="label">🔍 Scanner Neural (Shopee/Ali)</span>
                <input type="url" id="url" placeholder="Cole o link do produto">
                <button class="btn btn-primary" id="scanBtn" onclick="scanProduct()">🔥 LER PREÇO AUTO</button>
                
                <span class="label" style="margin-top:20px">📦 Inteligência Logística (CEP)</span>
                <input type="text" id="cep" placeholder="00000000" maxlength="8" oninput="checkCep()">
                <div id="endereco">Aguardando coordenadas...</div>

                <div class="grid-2">
                    <div><span class="label">💵 Custo Prod.</span><input id="custo" type="text" placeholder="0,00" oninput="updatePrice()"></div>
                    <div><span class="label">🚚 Frete Real</span><input id="frete" type="text" value="0,00" readonly style="color:var(--cyan)"></div>
                </div>

                <span class="label">💎 Venda Sugerida (Margem 45%)</span>
                <input id="venda" type="text" style="border:2px solid var(--gold);color:var(--gold);font-weight:900" readonly>
                
                <button class="btn btn-gold" onclick="calcLucro()">🚀 PROCESSAR LUCRO REAL</button>
            </div>

            <div id="resultado" class="card hidden" style="border-color:var(--green)">
                <div id="lucroValor" class="result-value">R$ 0,00</div>
                <button class="btn btn-whatsapp" onclick="window.open('https://wa.me/5511975473066')">📱 SUPORTE JUNIOR VIP</button>
            </div>
            
            <button onclick="logout()" style="background:none;border:none;color:rgba(255,255,255,.2);width:100%;cursor:pointer;font-size:10px;margin-bottom:30px">ENCERRAR SESSÃO</button>
        </section>
    </div>

<script>
    const firebaseConfig={apiKey:"AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I",authDomain:"vortexpro1021.firebaseapp.com",projectId:"vortexpro1021",storageBucket:"vortexpro1021.firebasestorage.app",messagingSenderId:"403000271858",appId:"1:403000271858:web:7a8716548ee0a1b822016b"};
    firebase.initializeApp(firebaseConfig);

    async function handleAuth(){
        const e=document.getElementById('email').value, p=document.getElementById('pass').value;
        try{await firebase.auth().signInWithEmailAndPassword(e,p)}catch(err){alert("❌ Acesso Negado")}
    }

    firebase.auth().onAuthStateChanged(user=>{
        if(user){
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
        }
    });

    async function checkCep(){
        const cep=document.getElementById('cep').value.replace(/\D/g,''), end=document.getElementById('endereco');
        if(cep.length===8){
            end.innerHTML='📡 Sincronizando...';
            try{
                const resp=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                const data=await resp.json();
                const json=JSON.parse(data.contents);
                if(!json.erro){
                    end.innerHTML=`📍 ${json.localidade}, ${json.uf} ✅`;
                    const fretes={'SP':12.9,'RJ':15.8,'MG':18.9,'BA':21.5};
                    document.getElementById('frete').value=(fretes[json.uf]||23.8).toFixed(2).replace('.',',');
                    updatePrice();
                }
            }catch(e){end.innerHTML='📍 Rota Regional';document.getElementById('frete').value='19,90';updatePrice();}
        }
    }

    async function scanProduct(){
        const url=document.getElementById('url').value, btn=document.getElementById('scanBtn');
        if(!url){alert('Cole o link!');return}
        btn.innerHTML='⛏️ Minerando...';
        try{
            const res=await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&wait=6000`);
            const html=await res.text();
            const match=html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})|(\d{1,3}(?:\.\d{3})*,\d{2})/);
            if(match){
                document.getElementById('custo').value=match[0].replace('R$','').trim();
                btn.innerHTML='✅ IDENTIFICADO';
                updatePrice();
            }else{btn.innerHTML='⚠️ Manual';}
        }catch(e){btn.innerHTML='❌ Erro Rede';}
    }

    function parseMoeda(v){return parseFloat(v.toString().replace(/\./g,'').replace(',','.'))||0}

    function updatePrice(){
        const c=parseMoeda(document.getElementById('custo').value), f=parseMoeda(document.getElementById('frete').value);
        if(c>0){
            const v=(c+f)*1.45; // Margem de 45%
            document.getElementById('venda').value=v.toFixed(2).replace('.',',');
        }
    }

    function calcLucro(){
        const v=parseMoeda(document.getElementById('venda').value), c=parseMoeda(document.getElementById('custo').value), f=parseMoeda(document.getElementById('frete').value);
        const lucro=v-c-f-(v*0.12);
        document.getElementById('lucroValor').innerHTML=`R$ ${lucro.toLocaleString('pt-BR',{minimumFractionDigits:2})} ✅`;
        document.getElementById('resultado').classList.remove('hidden');
        confetti({particleCount:200,spread:80,origin:{y:0.8}});
    }

    function logout(){firebase.auth().signOut().then(()=>location.reload())}
</script>
</body>
</html>
