<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vortex Pro | Dashboard Oficial</title>
                <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
                    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
                        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
                            <style>
                                    :root { --bg: #060608; --card: #111116; --primary: #8b5cf6; --accent: #f43f5e; --money: #10b981; }
                                            body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
                                                    .container { max-width: 450px; margin: 0 auto; padding: 20px; }
                                                            .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
                                                                    .btn-main { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
                                                                            input { width: 100%; padding: 16px; background: #000; border: 2px solid #222; color: #fff; border-radius: 16px; box-sizing: border-box; margin: 10px 0; font-weight: 600; }
                                                                                    #app, #register-screen { display: none; }
                                                                                            .link-toggle { color: var(--primary); font-size: 12px; cursor: pointer; text-decoration: underline; display: block; margin-top: 15px; text-align: center; }
                                                                                                    .notification { position: fixed; top: 20px; right: 20px; background: var(--card); border: 1px solid var(--primary); padding: 10px 20px; border-radius: 15px; font-size: 11px; z-index: 9999; display: none; }
                                                                                                        </style>
                                                                                                        </head>
                                                                                                        <body>

                                                                                                            <div id="notif" class="notification"></div>

                                                                                                                <div id="auth-container" class="container" style="padding-top: 60px;">
                                                                                                                        <div style="text-align: center; margin-bottom: 30px;">
                                                                                                                                    <h1 style="font-size: 38px; margin: 0; letter-spacing: -2px;">VORTEX<span style="color:var(--primary)"> PRO</span></h1>
                                                                                                                                                <p style="color: #666; font-weight: 700; font-size: 10px; letter-spacing: 2px;">AUTOMATION SYSTEM</p>
                                                                                                                                                        </div>

                                                                                                                                                                <div id="login-screen" class="card">
                                                                                                                                                                            <h3 style="text-align: center; margin-top: 0;">Entrar</h3>
                                                                                                                                                                                        <input type="email" id="loginEmail" placeholder="E-mail">
                                                                                                                                                                                                    <input type="password" id="loginPass" placeholder="Senha">
                                                                                                                                                                                                                <button class="btn-main" onclick="fazerLogin()">Acessar Painel</button>
                                                                                                                                                                                                                            <span class="link-toggle" onclick="toggleAuth()">Criar nova conta de afiliado</span>
                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                            <div id="register-screen" class="card">
                                                                                                                                                                                                                                                        <h3 style="text-align: center; margin-top: 0;">Cadastro Elite</h3>
                                                                                                                                                                                                                                                                    <input type="email" id="regEmail" placeholder="Seu melhor e-mail">
                                                                                                                                                                                                                                                                                <input type="password" id="regPass" placeholder="Senha">
                                                                                                                                                                                                                                                                                            <button class="btn-main" style="background: var(--money); color: #111;" onclick="fazerCadastro()">Ativar Licença</button>
                                                                                                                                                                                                                                                                                                        <span class="link-toggle" onclick="toggleAuth()">Já tenho conta. Logar</span>
                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                        <div id="app" class="container">
                                                                                                                                                                                                                                                                                                                                <div class="card" style="border-left: 4px solid var(--primary);">
                                                                                                                                                                                                                                                                                                                                            <div style="display: flex; justify-content: space-between;">
                                                                                                                                                                                                                                                                                                                                                            <span id="userLevel" style="background: #cd7f32; color: #000; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 10px;">LEVEL BRONZE</span>
                                                                                                                                                                                                                                                                                                                                                                            <span style="color: var(--money); font-weight: 800; font-size: 11px;">CONECTADO ●</span>
                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                    <h2 id="userName" style="margin: 15px 0 5px 0;">Olá!</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                <p id="userStatus" style="font-size: 11px; color: #888;">ID: #VORTEX-USER</p>
                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                            <h4 style="color: var(--primary); margin: 0 0 10px 0;">⚡ EXECUTOR VORTEX</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="text" id="prodLink" placeholder="Cole o link do produto aqui...">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="btn-main" onclick="processarLink()">INICIAR VARREDURA</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="result" style="display: none; margin-top: 20px; text-align: center;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p style="font-size: 12px; color: var(--money);">Varredura completa! Clique abaixo para validar:</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="btn-main" style="background: #25d366; color: #fff;" id="whatsappBtn">FINALIZAR NO WHATSAPP</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="card" style="margin: 0;"><p style="font-size: 10px; color: #888; margin: 0;">SALDO</p><div style="color:var(--money); font-size: 24px; font-weight: 800;">R$ 0,00</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="card" style="margin: 0;"><p style="font-size: 10px; color: #888; margin: 0;">TAXA (7%)</p><div style="color:var(--primary); font-size: 24px; font-weight: 800;">R$ 0,00</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="btn-main" style="background: #222; margin-top: 30px; font-size: 12px;" onclick="firebase.auth().signOut().then(() => location.reload())">SAIR</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const firebaseConfig = {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                apiKey: "SUA_API_KEY", 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            authDomain: "vortexpro1021.firebaseapp.com",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        projectId: "vortexpro1021",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    storageBucket: "vortexpro1021.firebasestorage.app",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                messagingSenderId: "403000271858",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            appId: "1:403000271858:web:7a8716548ee0a1b8"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            firebase.initializeApp(firebaseConfig);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const ADMIN_EMAIL = "jrbatata2017@gmail.com";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const MY_PHONE = "5511975473066";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function toggleAuth() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('login-screen').style.display = document.getElementById('login-screen').style.display === 'none' ? 'block' : 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('register-screen').style.display = document.getElementById('register-screen').style.display === 'block' ? 'none' : 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function fazerCadastro() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const email = document.getElementById('regEmail').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const pass = document.getElementById('regPass').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                firebase.auth().createUserWithEmailAndPassword(email, pass).then(() => location.reload()).catch(err => alert(err.message));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function fazerLogin() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const email = document.getElementById('loginEmail').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const pass = document.getElementById('loginPass').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    firebase.auth().signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    firebase.auth().onAuthStateChanged((user) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (user) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('auth-container').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('app').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(user.email === ADMIN_EMAIL) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('userName').innerText = "Olá, Junior Sabino!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('userLevel').innerText = "GOLD ADMIN";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('userLevel').style.background = "#ffd700";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('userName').innerText = "Olá, Afiliado!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function processarLink() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const link = document.getElementById('prodLink').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(!link) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.querySelector('.btn-main').innerText = "BUSCANDO...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('result').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const msg = encodeURIComponent(`Olá Junior! Quero validar este produto no Vortex Pro: ${link}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('whatsappBtn').onclick = () => window.open(`https://wa.me/${MY_PHONE}?text=${msg}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 2000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
