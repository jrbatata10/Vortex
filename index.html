<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Pro | Inteligência em Dropshipping</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #060608; --card: #111116; --primary: #8b5cf6; --accent: #f43f5e; --money: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; font-size: 32px; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; background: #000; border: 2px solid #222; color: #fff; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .hidden { display: none !important; }
        #result { margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea" class="card">
            <h1>VORTEX PRO</h1>
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="password" placeholder="Sua senha">
            <button onclick="login()">ACESSAR SISTEMA</button>
        </div>

        <div id="appArea" class="card hidden">
            <h2 id="userName" style="font-size: 20px; margin-bottom: 15px;">Olá!</h2>
            <input type="number" id="sale" placeholder="Preço de Venda">
            <input type="number" id="supplier" placeholder="Custo Fornecedor">
            <input type="number" id="shipping" placeholder="Frete">
            <button onclick="analyze()">ANALISAR LUCRO</button>
            <div id="result" class="hidden">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Lucro Líquido:</span><b id="resProfit" style="color:var(--money)">R$ 0,00</b>
                </div>
                <button style="background: #25d366;" onclick="window.open('https://wa.me/5511975473066')">FALAR COM JUNIOR</button>
            </div>
            <button style="background: #222; margin-top: 20px; font-size: 12px;" onclick="auth.signOut().then(()=>location.reload())">SAIR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-10bN_I",
            authDomain: "vortexpro1021.firebaseapp.com",
            projectId: "vortexpro1021",
            storageBucket: "vortexpro1021.firebasestorage.app",
            messagingSenderId: "403000271858",
            appId: "1:403000271858:web:7a8716548ee0a1b8764f69"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => {
                auth.createUserWithEmailAndPassword(e, p).catch(err => alert("Erro: " + err.message));
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('appArea').classList.remove('hidden');
                document.getElementById('userName').innerText = user.email === "jrbatata2017@gmail.com" ? "Olá, Junior Sabino!" : "Olá, Afiliado!";
            }
        });

        function analyze() {
            const sale = parseFloat(document.getElementById('sale').value) || 0;
            const supplier = parseFloat(document.getElementById('supplier').value) || 0;
            const shipping = parseFloat(document.getElementById('shipping').value) || 0;
            const profit = sale - supplier - shipping - (sale * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + profit.toFixed(2);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
