<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO AI | Master Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #050508; --card: #0c0c16; --primary: #7c3aed; 
            --gold: #f59e0b; --green: #10b981; --red: #ef4444;
            --text-dim: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg); color: #fff; 
            background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .header { text-align: center; margin: 30px 0; }
        .logo-v { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -2px; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .screen { width: 100%; display: none; flex-direction: column; max-width: 400px; animation: fadeIn 0.5s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .label { font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        
        input { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-size: 16px; font-weight: 600; font-family: 'Space Grotesk'; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); outline: none; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Space Grotesk'; transition: 0.2s; font-size: 14px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-white { background: #fff; color: #000; margin-bottom: 12px; }

        #rankLabel { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
        .badge-gold { border: 1px solid var(--gold); color: var(--gold); background: rgba(245, 158, 11, 0.05); }

        #locDisplay { font-size: 12px; color: var(--green); font-weight: 600; margin-top: -10px; margin-bottom: 15px; min-height: 18px; }

        .result-title { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        .result-value { font-family: 'Space Grotesk'; font-size: 42px; font-weight: 700; color: var(--green); margin-bottom: 15px; }

        .ad-link { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid #1d4ed8; background: linear-gradient(to right, #1e3a8a, #000); display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; margin-top: 10px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-v">VORTEX PRO AI</div>
    </div>

    <section id="screen-login" class="screen active">
        <div class="card">
            <span class="label">Acesso Restrito</span>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" onclick="handleAuth()">Entrar no Terminal</button>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div id="rankBadge" class="card" style="text-align: center; padding: 12px;">
            <span id="rankLabel">AUTENTICANDO PATENTE...</span>
        </div>

        <div class="card">
            <span class="label">Scanner de Produto</span>
            <input type="url" id="productUrl" placeholder="Link do fornecedor">
            <button class="btn btn-white" id="btnExtract" onclick="capturePrice()">Extrair Preço</button>
            
            <span class="label">Cálculo de Rota (CEP)</span>
            <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)">
            <div id="locDisplay"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div><span class="label">Custo Unit.</span><input type="text" id="supplier" placeholder="0,00" oninput="atualizarSugestao()"></div>
                <div><span class="label">Frete Est.</span><input type="text" id="shipping" value="0,00" readonly></div>
            </div>

            <span class="label">Sugestão de Venda</span>
            <input type="text" id="sale" style="border-color: var(--primary); color: var(--primary);">
            
            <button class="btn btn-primary" onclick="calcular()">Calcular Margem Real</button>
        </div>

        <div id="resultCard" class="card hidden" style="text-align: center; border-color: var(--green);">
            <div class="result-title">LUCRO LÍQUIDO OPERACIONAL</div>
            <div id="resProfit" class="result-value">R$ 0,00</div>
            
            <a class="ad-link" href="https://www.nuvemshop.com.br/partners/vrtex-pro" target="_blank">
                <span style="font-size: 24px;">🏢</span>
                <div style="text-align: left;">
                    <div style="font-size: 10px; font-weight: 800; color: #60a5fa;">PARCEIRO OFICIAL</div>
                    <div style="font-size: 13px; font-weight: 700; color: #fff;">Criar Loja Nuvemshop</div>
                </div>
            </a>
        </div>
        
        <button onclick="logout()" class="btn" style="background:transparent; color: #444; font-size: 11px;">Encerrar Sessão</button>
    </section>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert("Falha na autenticação."); }
        }

        firebase.auth().onAuthStateChanged(async (user) => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                const label = document.getElementById('rankLabel');
                const badge = document.getElementById('rankBadge');
                const patente = doc.exists ? (doc.data().patente || "BRONZE") : "BRONZE";
                
                label.innerText = `PATENTE: ${patente} ${patente === 'OURO' ? '💎' : '🛡️'}`;
                if(patente === 'OURO') badge.classList.add('badge-gold');
                
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-app').style.display = 'flex';
            }
        });

        function logout() { firebase.auth().signOut().then(() => window.location.reload()); }

        function cleanNum(v) { return parseFloat(v.toString().replace(',', '.')) || 0; }

        function atualizarSugestao() {
            const c = cleanNum(document.getElementById('supplier').value);
            const f = cleanNum(document.getElementById('shipping').value);
            if(c > 0) document.getElementById('sale').value = ((c + f) * 1.33).toFixed(2).replace('.', ',');
        }

        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                display.innerText = "Sincronizando coordenadas...";
                try {
                    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const d = await r.json();
                    if(!d.erro) {
                        display.innerText = `📍 ${d.localidade}, ${d.uf}`;
                        document.getElementById('shipping').value = (d.uf === 'SP' ? "12,90" : "22,50");
                        atualizarSugestao();
                    } else { throw new Error(); }
                } catch(e) {
                    display.innerText = "⚠️ Offline: Usando frete regional est.";
                    document.getElementById('shipping').value = "18,90";
                    atualizarSugestao();
                }
            }
        }

        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnExtract');
            if(!url) return;
            btn.innerText = "Minerando...";
            try {
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=false&premium_proxy=true`);
                const html = await res.text();
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) {
                    document.getElementById('supplier').value = match[1];
                    atualizarSugestao();
                } else { alert("Site protegido. Insira o custo manualmente."); }
            } catch (e) { alert("Erro de sinal."); } finally { btn.innerText = "Extrair Preço"; }
        }

        function calcular() {
            const v = cleanNum(document.getElementById('sale').value);
            const c = cleanNum(document.getElementById('supplier').value);
            const f = cleanNum(document.getElementById('shipping').value);
            const lucro = v - c - f - (v * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resProfit').style.color = lucro > 0 ? 'var(--green)' : 'var(--red)';
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }
    </script>
</body>
</html>
