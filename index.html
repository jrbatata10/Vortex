<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX PRO AI | OPERAÇÃO ELITE</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #050508; --card: rgba(10, 10, 20, 0.8); --primary: #7c3aed; 
            --gold: #f59e0b; --green: #10b981; --cyan: #22d3ee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050508 75%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 25px 0; letter-spacing: 2px; }
        .screen { width: 100%; display: none; flex-direction: column; max-width: 400px; animation: slideUp 0.4s ease-out; }
        .active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); padding: 22px; border-radius: 20px; border: 1px solid rgba(124, 58, 237, 0.2); width: 100%; margin-bottom: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .label { font-size: 10px; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 14px; margin-bottom: 14px; border-radius: 12px; border: 1px solid #1e1e30; background: #000; color: #fff; font-size: 16px; font-family: 'Space Grotesk'; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Space Grotesk'; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3); }
        .btn-miner { background: #fff; color: #000; margin-bottom: 15px; border: 1px solid #ccc; }
        #locDisplay { font-size: 13px; color: var(--green); font-weight: 700; margin-top: -8px; margin-bottom: 18px; padding-left: 5px; }
        .result-value { font-family: 'Space Grotesk'; font-size: 44px; font-weight: 800; color: var(--green); text-align: center; margin: 10px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="logo">VORTEX PRO AI</div>

    <section id="screen-login" class="screen active">
        <div class="card">
            <span class="label">Operador Autorizado</span>
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="pass" placeholder="Sua senha">
            <button class="btn btn-primary" onclick="handleAuth()">ACESSAR TERMINAL</button>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div class="card" style="text-align: center; border-color: var(--gold); padding: 15px;">
            <div id="rankLabel" style="font-size: 20px; font-weight: 800; color: var(--gold); font-family: 'Space Grotesk';">PATENTE OURO 💎</div>
        </div>

        <div class="card">
            <span class="label">Scanner de Produto (URL)</span>
            <input type="url" id="productUrl" placeholder="Cole o link Shopee/AliExpress">
            <button class="btn btn-miner" id="btnExtract" onclick="capturePrice()">⚡ INICIAR MINERAÇÃO</button>
            
            <span class="label">Logística e Frete (CEP)</span>
            <input type="text" id="destCep" placeholder="Digite o CEP de destino" maxlength="8" oninput="validarCEP(this)">
            <div id="locDisplay"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div><span class="label">Custo Fornec.</span><input type="text" id="supplier" placeholder="0,00" oninput="atualizarSugestao()"></div>
                <div><span class="label">Frete Estimado</span><input type="text" id="shipping" value="0,00" readonly style="opacity: 0.7;"></div>
            </div>

            <span class="label">Sugestão de Venda</span>
            <input type="text" id="sale" style="border-color: var(--primary); color: var(--primary); font-weight: 800;">
            
            <button class="btn btn-primary" onclick="calcular()">CALCULAR LUCRO REAL</button>
        </div>

        <div id="resultCard" class="card hidden" style="border-color: var(--green); text-align: center;">
            <span class="label" style="color: var(--green);">Resultado da Operação</span>
            <div id="resProfit" class="result-value">R$ 0,00</div>
        </div>
    </section>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert("Erro na autenticação."); }
        }

        firebase.auth().onAuthStateChanged(async (user) => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                const patente = doc.exists ? (doc.data().patente || "OURO") : "OURO";
                document.getElementById('rankLabel').innerText = 'PATENTE ' + patente + ' 💎';
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-app').style.display = 'flex';
            }
        });

        // MOTOR DE CEP COM TÚNEL (ESTÁVEL)
        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                display.innerText = "🔍 Buscando dados...";
                try {
                    // Usando o túnel allorigins para evitar o erro de sinal do navegador
                    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                    const d = await r.json();
                    const json = JSON.parse(d.contents);
                    
                    if(!json.erro) {
                        display.innerHTML = `📍 ${json.localidade}, ${json.uf}`;
                        document.getElementById('shipping').value = (json.uf === 'SP' ? "12,90" : "21,80");
                        atualizarSugestao();
                    } else { display.innerText = "❌ CEP inválido"; }
                } catch(e) { 
                    display.innerText = "📍 Conexão Local Ativa";
                    document.getElementById('shipping').value = "19,50";
                }
            }
        }

        function n(v) { return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0; }
        function atualizarSugestao() {
            const c = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            if(c > 0) document.getElementById('sale').value = ((c + f) * 1.35).toFixed(2).replace('.', ',');
        }

        // MOTOR DE IDENTIFICAÇÃO DE PRODUTO (PREMIUM)
        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnExtract');
            if(!url) return;
            btn.innerText = "MINERANDO...";
            try {
                // Configuração direta para o ScrapingBee identificar preços em Shopee/AliExpress
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true`);
                const html = await res.text();
                // Busca padrão de preço em Reais (R$)
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) {
                    document.getElementById('supplier').value = match[1];
                    atualizarSugestao();
                } else { alert("Valor não identificado automaticamente."); }
            } catch (e) { console.error("Erro na mineração."); } finally { btn.innerText = "⚡ INICIAR MINERAÇÃO"; }
        }

        function calcular() {
            const v = n(document.getElementById('sale').value);
            const c = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            const lucro = v - c - f - (v * 0.12); // Desconto de taxas padrão
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }
    </script>
</body>
</html>
