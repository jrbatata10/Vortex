<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=0.8,maximum-scale=1,user-scalable=no"><title>VORTEX PRO AI v3.0</title><script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script><style>:root{--bg:#020205;--card:rgba(10,10,25,.9);--primary:#7c3aed;--gold:#fbbf24;--green:#10b981;--cyan:#06b6d4;}*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden;position:relative;}.aurora{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:radial-gradient(circle at 20% 20%,rgba(124,58,237,.25) 0%,transparent 40%),radial-gradient(circle at 80% 80%,rgba(6,182,212,.2) 0%,transparent 40%);animation:auroraMove 20s infinite;}@keyframes auroraMove{0%,100%{transform:scale(1);opacity:.8;}50%{transform:scale(1.1);opacity:1;}}.grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(124,58,237,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.05) 1px,transparent 1px);background-size:30px 30px;z-index:-1;}.container{max-width:420px;margin:0 auto;padding:20px;position:relative;}.logo{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;text-align:center;margin:25px 0;text-shadow:0 0 15px var(--primary);letter-spacing:4px;color:#fff;}.logo span{color:var(--cyan);}.card{background:var(--card);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:22px;margin-bottom:20px;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,.6);position:relative;overflow:hidden;}.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,transparent,transparent,var(--primary));animation:rotate 4s linear infinite;z-index:-1;opacity:.2;}@keyframes rotate{100%{transform:rotate(360deg);}}.label{font-size:10px;color:var(--cyan);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:block;font-family:'Orbitron';}input{width:100%;padding:15px;margin-bottom:15px;border-radius:10px;border:1px solid #1e1e30;background:rgba(0,0,0,.7);color:#fff;font-size:16px;font-family:'Space Grotesk',sans-serif;transition:.3s;}input:focus{border-color:var(--cyan);box-shadow:0 0 15px rgba(6,182,212,.3);outline:none;}.btn{width:100%;padding:18px;border-radius:12px;border:none;font-weight:800;cursor:pointer;text-transform:uppercase;font-family:'Orbitron';transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;}.btn-primary{background:var(--primary);color:#fff;box-shadow:0 5px 20px rgba(124,58,237,.4);}.btn-gold{background:var(--gold);color:#000;margin-top:10px;box-shadow:0 5px 20px rgba(251,191,36,.3);}.btn-whatsapp{background:#25d366;color:#fff;margin-top:15px;font-size:13px;}#locDisplay{font-size:13px;color:var(--green);margin:-10px 0 15px;font-weight:700;padding:12px;background:rgba(16,185,129,.1);border-radius:10px;border-left:4px solid var(--green);text-transform:uppercase;}.result-value{font-family:'Orbitron';font-size:42px;color:var(--green);text-align:center;margin:15px 0;text-shadow:0 0 20px var(--green);}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.hidden{display:none!important;}.footer-compliance{font-size:9px;color:rgba(255,255,255,.2);text-align:center;margin-top:20px;letter-spacing:1px;line-height:1.5;}</style></head><body><div class="aurora"></div><div class="grid-bg"></div><div class="container"><div class="logo">VORTEX<span>PRO</span> AI</div><section id="screen-login"><div class="card"><span class="label">Autenticação</span><input type="email" id="email" placeholder="E-mail"><input type="password" id="pass" placeholder="Senha"><button class="btn btn-primary" onclick="handleAuth()">🔐 ATIVAR</button></div><div class="footer-compliance">SAAS PROFISSIONAL | LGPD OK</div></section><section id="screen-app" class="hidden"><div class="card" style="text-align:center;border-color:var(--gold);background:rgba(251,191,36,.05)"><div style="font-size:22px;font-weight:900;color:var(--gold);font-family:'Orbitron'">ELITE OURO 💎</div></div><div class="card"><span class="label">Scanner de Links</span><input type="url" id="productUrl" placeholder="Link Shopee/Ali/Amazon"><button class="btn btn-primary" id="btnMiner" onclick="capturePrice()">⚡ ESCANEAR</button><span class="label">CEP Brasil</span><input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)"><div id="locDisplay">Aguardando...</div><div class="grid-2"><div><span class="label">Custo</span><input type="text" id="supplier" placeholder="0,00" oninput="calcSuggest()"></div><div><span class="label">Frete</span><input type="text" id="shipping" value="0,00" readonly style="color:var(--cyan)"></div></div><span class="label">Preço Sugerido</span><input type="text" id="sale" style="border-color:var(--gold);color:var(--gold);font-weight:900"><button class="btn btn-gold" onclick="calcular()">🚀 LUCRO</button></div><div id="resultCard" class="card hidden" style="border-color:var(--green)"><div id="resProfit" class="result-value">R$ 0,00</div><button class="btn btn-whatsapp" onclick="window.open('https://wa.me/5511982755510')">💬 SUPORTE</button></div><button onclick="logout()" style="background:none;border:none;color:rgba(255,255,255,.1);width:100%;cursor:pointer;font-size:10px;margin:30px 0">SAIR</button></div><script>const firebaseConfig={apiKey:"AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I",authDomain:"vortexpro1021.firebaseapp.com",projectId:"vortexpro1021",storageBucket:"vortexpro1021.firebasestorage.app",messagingSenderId:"403000271858",appId:"1:403000271858:web:7a8716548ee0a1b822016b"};firebase.initializeApp(firebaseConfig);async function handleAuth(){const e=document.getElementById('email').value,p=document.getElementById('pass').value;try{await firebase.auth().signInWithEmailAndPassword(e,p)}catch(err){alert("Acesso Negado")}}firebase.auth().onAuthStateChanged(user=>{if(user){document.getElementById('screen-login').classList.add('hidden');document.getElementById('screen-app').classList.remove('hidden')}});async function validarCEP(el){const display=document.getElementById('locDisplay'),cep=el.value.replace(/D/g,'');if(cep.length===8){display.innerText="📡 BUSCANDO...";try{const res=await fetch(`https://viacep.com.br/ws/${cep}/json/`),data=await res.json();if(!data.erro){display.innerHTML=`📍 ${data.localidade}, ${data.uf} ✅`;document.getElementById('shipping').value=data.uf==='SP'?"12,90":"23,80";calcSuggest()}else display.innerText="❌ CEP INVÁLIDO"}catch(e){display.innerText="📍 REGIONAL";document.getElementById('shipping').value="19,90";calcSuggest()}}}async function capturePrice(){const url=document.getElementById('productUrl').value,btn=document.getElementById('btnMiner');if(!url)return;btn.innerText="⛏️ ANALISANDO...";try{let custo=0;if(url.includes('shopee')){const shopId=url.match(/i.shopee.com.br/([^s]+)/)?.[1];if(shopId){const res=await fetch(`https://shopee.com.br/api/v4/item/get?itemid=${shopId.split('.')[0]}&shopid=${shopId.split('.')[1]}`),data=await res.json();custo=data.item.price_min/100000}}else if(url.includes('aliexpress')){const res=await fetch(url),html=await res.text(),match=html.match(/data-price="([d,]+)"/);custo=match?parseFloat(match[1].replace(',','.')):0}document.getElementById('supplier').value=custo?(custo).toFixed(2).replace('.',','):'';calcSuggest()}catch(e){alert("Insira custo manualmente")}finally{btn.innerText="⚡ ESCANEAR"}}function n(v){return parseFloat(v.toString().replace(/./g,'').replace(',','.'))||0}function calcSuggest(){const s=n(document.getElementById('supplier').value),f=n(document.getElementById('shipping').value);if(s>0){const sugerido=(s+f)*1.45;document.getElementById('sale').value=sugerido.toFixed(2).replace('.',',')}}function calcular(){const v=n(document.getElementById('sale').value),s=n(document.getElementById('supplier').value),f=n(document.getElementById('shipping').value),lucro=v-s-f-(v*0.12);document.getElementById('resProfit').innerText="R$ "+lucro.toLocaleString('pt-BR',{minimumFractionDigits:2});document.getElementById('resultCard').classList.remove('hidden');confetti({particleCount:200,spread:80,origin:{y:0.8},colors:['#7c3aed','#fbbf24','#10b981']})}function logout(){firebase.auth().signOut().then(()=>window.location.reload())}</script></body></html>
