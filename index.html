<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX PRO AI | ELITE OPERATIONS v26.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #050508; --card: rgba(10, 10, 20, 0.7); --primary: #8b5cf6;
            --gold: #fbbf24; --green: #34d399; --cyan: #22d3ee;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; position: relative; }

        /* === DESIGN KIMI: AURORA E PARTICULAS === */
        .aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.2) 0%, transparent 50%);
            animation: auroraMove 20s ease-in-out infinite;
        }
        @keyframes auroraMove { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(25px, -25px) scale(1.05); } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle { position: absolute; width: 3px; height: 3px; background: var(--primary); border-radius: 50%; opacity: 0.4; animation: float 12s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 100% { transform: translateY(-100vh); opacity: 0; } }

        .container { max-width: 420px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; letter-spacing: 2px; }

        /* CARD GLASSMORPHISM */
        .card { 
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; padding: 22px; margin-bottom: 20px; box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5); 
        }

        .label { font-size: 11px; color: var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.5); color: #fff; font-size: 16px; font-family: 'Space Grotesk'; }

        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-family: 'Space Grotesk'; text-transform: uppercase; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #000; margin-top: 10px; }
        .scanner-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: white; margin-bottom: 15px; }

        /* LOGÍSTICA IDENTIFICADA */
        #locDisplay { font-size: 13px; color: var(--green); font-weight: 700; margin-top: -10px; margin-bottom: 20px; padding: 12px; background: rgba(52, 211, 153, 0.1); border-radius: 12px; border-left: 4px solid var(--green); }
        .result-value { font-family: 'Space Grotesk'; font-size: 46px; font-weight: 800; color: var(--green); text-shadow: 0 0 30px rgba(52, 211, 153, 0.5); text-align: center; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none !important; }
        .nuvem-banner { background: linear-gradient(90deg, #0046ff, #001a4d); padding: 15px; border-radius: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo">VORTEX PRO AI</div>

        <section id="screen-app">
            <div class="card" style="text-align: center; border-color: var(--gold);">
                <div style="font-size: 22px; font-weight: 800; color: var(--gold);">ELITE OURO 💎</div>
            </div>

            <div class="card">
                <span class="label">🔍 Scanner Neural (Universal)</span>
                <input type="url" id="productUrl" placeholder="Link do produto aqui">
                <button class="btn scanner-btn" id="btnExtract" onclick="capturePrice()">⚡ INICIAR MINERAÇÃO</button>
                
                <span class="label">📍 Inteligência Logística</span>
                <input type="text" id="destCep" placeholder="00000-000" maxlength="8" oninput="validarCEP(this)">
                <div id="locDisplay">Aguardando CEP...</div>

                <div class="grid-2">
                    <div><span class="label">💰 Custo</span><input type="text" id="supplier" placeholder="0,00" oninput="atualizarSugestao()"></div>
                    <div><span class="label">🚚 Frete Real</span><input type="text" id="shipping" value="0,00" readonly style="opacity: 0.7;"></div>
                </div>

                <span class="label">💎 Preço Elite Sugerido</span>
                <input type="text" id="sale" style="border-color: var(--gold); color: var(--gold);">
                
                <button class="btn btn-gold" onclick="calcular()">🚀 CALCULAR LUCRO REAL</button>
            </div>

            <div id="resultCard" class="card hidden">
                <div style="font-size: 12px; color: var(--green); text-align: center;">LUCRO LÍQUIDO ESTIMADO</div>
                <div id="resProfit" class="result-value">R$ 0,00</div>
                <div class="nuvem-banner" onclick="window.open('https://www.nuvemshop.com.br/partners/vrtex-pro')">
                    <span style="font-size: 22px;">🏢</span>
                    <div style="text-align: left; font-size: 12px;"><b>NUVEMSHOP</b><br>Escalar Operação</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // GERADOR DE PARTICULAS (KIMI)
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);

        // MOTOR DE CEP ESTÁVEL (PRINT 1000113189)
        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                display.innerText = "🔍 Sincronizando rota...";
                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                    const data = await response.json();
                    const json = JSON.parse(data.contents);
                    if(!json.erro) {
                        display.innerHTML = `📍 ${json.localidade}, ${json.uf} ✅`;
                        document.getElementById('shipping').value = (json.uf === 'SP' ? "12,90" : "22,50");
                        atualizarSugestao();
                    }
                } catch(e) { display.innerText = "📍 Conexão Regional Ativa"; document.getElementById('shipping').value = "19,90"; }
            }
        }

        // MOTOR DE ENTRADA BLINDADA (PARA NÃO DAR FALHA NO LINK)
        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnExtract');
            if(!url) return;
            btn.innerText = "MINERANDO...";
            try {
                // Configuração Universal com espera de 6 segundos para furar o bloqueio da Amazon/Shopee
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true&wait=6000`);
                const html = await res.text();
                // Regex universal que procura por valores em R$ ou padrões de preço
                const regex = /R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})|(\d{1,3}(?:\.\d{3})*,\d{2})/g;
                const matches = html.match(regex);
                if(matches) {
                    document.getElementById('supplier').value = matches[0].replace('R$', '').trim();
                    atualizarSugestao();
                } else { alert("Site bloqueou a entrada. Insira o custo manual."); }
            } catch (e) { alert("Sinal de rede instável."); } finally { btn.innerText = "⚡ INICIAR MINERAÇÃO"; }
        }

        function n(v) { return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0; }
        function atualizarSugestao() {
            const c = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            if(c > 0) document.getElementById('sale').value = ((c + f) * 1.35).toFixed(2).replace('.', ',');
        }

        function calcular() {
            const v = n(document.getElementById('sale').value);
            const c = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            const lucro = v - c - f - (v * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#fbbf24', '#8b5cf6', '#34d399'] });
        }
    </script>
</body>
</html>
