  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vortex Pro | Dashboard Oficial</title>
                <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
                    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
                        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
                            <style>
                                    :root { --bg: #060608; --card: #111116; --primary: #8b5cf6; --accent: #f43f5e; --money: #10b981; }
                                            body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
                                                    .container { max-width: 450px; margin: 0 auto; padding: 20px; }
                                                            .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
                                                                    .btn-main { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
                                                                            input { width: 100%; padding: 16px; background: #000; border: 2px solid #222; color: #fff; border-radius: 16px; box-sizing: border-box; margin: 10px 0; }
                                                                                    #app, #register-screen { display: none; }
                                                                                            .link-toggle { color: var(--primary); font-size: 12px; cursor: pointer; text-decoration: underline; display: block; margin-top: 15px; text-align: center; }
                                                                                                </style>
                                                                                                </head>
                                                                                                <body>
                                                                                                
                                                                                                    <div id="auth-container" class="container" style="padding-top: 60px;">
                                                                                                            <div style="text-align: center; margin-bottom: 30px;">
                                                                                                                        <h1 style="font-size: 38px; margin: 0;">VORTEX PRO</h1>
                                                                                                                                </div>
                                                                                                                                
                                                                                                                                        <div id="login-screen" class="card">
                                                                                                                                                    <h3 style="text-align: center;">Entrar</h3>
                                                                                                                                                                <input type="email" id="loginEmail" placeholder="E-mail">
                                                                                                                                                                            <input type="password" id="loginPass" placeholder="Senha">
                                                                                                                                                                                        <button class="btn-main" onclick="fazerLogin()">Acessar Painel</button>
                                                                                                                                                                                                    <span class="link-toggle" onclick="toggleAuth()">Criar conta de afiliado</span>
                                                                                                                                                                                                            </div>
                                                                                                                                                                                                            
                                                                                                                                                                                                                    <div id="register-screen" class="card">
                                                                                                                                                                                                                                <h3 style="text-align: center;">Cadastro</h3>
                                                                                                                                                                                                                                            <input type="email" id="regEmail" placeholder="E-mail">
                                                                                                                                                                                                                                                        <input type="password" id="regPass" placeholder="Senha">
                                                                                                                                                                                                                                                                    <button class="btn-main" onclick="fazerCadastro()">Ativar Licença</button>
                                                                                                                                                                                                                                                                                <span class="link-toggle" onclick="toggleAuth()">Já tenho conta</span>
                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                <div id="app" class="container">
                                                                                                                                                                                                                                                                                                        <div class="card">
                                                                                                                                                                                                                                                                                                                    <h2 id="userName">Bem-vindo!</h2>
                                                                                                                                                                                                                                                                                                                                <p id="userLevel">Aguarde...</p>
                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                <button class="btn-main" onclick="firebase.auth().signOut().then(() => location.reload())">SAIR</button>
                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                // CHAVES REAIS (COPIE EXATAMENTE ASSIM)
                                                                                                                                                                                                                                                                                                                                                                        const firebaseConfig = {
                                                                                                                                                                                                                                                                                                                                                                                    apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-10bN_I",
                                                                                                                                                                                                                                                                                                                                                                                                authDomain: "vortexpro1021.firebaseapp.com",
                                                                                                                                                                                                                                                                                                                                                                                                            projectId: "vortexpro1021",
                                                                                                                                                                                                                                                                                                                                                                                                                        storageBucket: "vortexpro1021.firebasestorage.app",
                                                                                                                                                                                                                                                                                                                                                                                                                                    messagingSenderId: "403000271858",
                                                                                                                                                                                                                                                                                                                                                                                                                                                appId: "1:403000271858:web:7a8716548ee0a1b8764f69"
                                                                                                                                                                                                                                                                                                                                                                                                                                                        };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                firebase.initializeApp(firebaseConfig);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const ADMIN_EMAIL = "jrbatata2017@gmail.com";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function toggleAuth() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const login = document.getElementById('login-screen');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const register = document.getElementById('register-screen');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    login.style.display = login.style.display === 'none' ? 'block' : 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                register.style.display = register.style.display === 'block' ? 'none' : 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function fazerCadastro() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const email = document.getElementById('regEmail').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const pass = document.getElementById('regPass').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    firebase.auth().createUserWithEmailAndPassword(email, pass)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .then(() => alert("Conta criada com sucesso!"))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .catch(err => alert("Erro ao criar: " + err.message));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function fazerLogin() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const email = document.getElementById('loginEmail').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const pass = document.getElementById('loginPass').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        firebase.auth().signInWithEmailAndPassword(email, pass)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .catch(err => alert("Erro ao entrar: " + err.message));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        firebase.auth().onAuthStateChanged((user) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (user) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('auth-container').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('app').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('userName').innerText = user.email === ADMIN_EMAIL ? "Olá, Junior Sabino!" : "Olá, Afiliado!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('userLevel').innerText = user.email === ADMIN_EMAIL ? "GOLD ADMIN" : "BRONZE";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }, 2000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
