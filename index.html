<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO | Full Automation</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #050508; --surface: #0f0f16; --primary: #8b5cf6; --gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f43f5e 100%); --money: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; }
        .card { background: var(--surface); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; position: relative; }
        h1 { font-family: 'Space Grotesk'; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; font-size: 24px; }
        .label-tag { font-size: 10px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-bottom: 10px; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-capture { background: #fff; color: #000; }
        .history-item { background: #000; padding: 15px; border-radius: 16px; margin-top: 10px; border-left: 4px solid var(--primary); font-size: 11px; }
        .hidden { display: none !important; }
        #locationBadge { font-size: 11px; color: var(--money); margin-top: -8px; margin-bottom: 10px; display: block; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>VORTEX PRO</h1>
            
            <span class="label-tag">1. Inteligência de Preço (ScrapingBee)</span>
            <input type="text" id="productUrl" placeholder="Link Shopee/AliExpress">
            <button class="btn btn-capture" id="btnCapture">🔍 CAPTURAR PREÇO REAL</button>

            <span class="label-tag">2. Localização do Cliente</span>
            <input type="text" id="destCep" placeholder="Digite o CEP" maxlength="8">
            <span id="locationBadge">Aguardando CEP...</span>
            
            <span class="label-tag">3. Resumo da Operação</span>
            <input type="number" id="supplier" placeholder="Custo Produto (R$)">
            <input type="number" id="shipping" placeholder="Frete Calculado (R$)" readonly>
            <input type="number" id="sale" placeholder="Venda Sugerida (R$)">
            
            <button class="btn btn-primary" id="analyzeBtn">⚡ ANALISAR LUCRO LÍQUIDO</button>
        </div>

        <div id="resultCard" class="card hidden" style="text-align: center; border: 2px solid var(--money);">
            <p style="color:#888;">Lucro por Venda:</p>
            <h2 id="resProfit" style="color:var(--money); font-size: 32px; margin: 10px 0;">R$ 0,00</h2>
            <button class="btn btn-primary" id="saveHistoryBtn" style="font-size: 12px;">💾 SALVAR NO HISTÓRICO</button>
        </div>

        <div class="card">
            <h4 style="font-size: 14px; margin-bottom: 15px; color: #666;">📦 ÚLTIMAS MINERAÇÕES</h4>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I",
            authDomain: "vortexpro1021.firebaseapp.com",
            projectId: "vortexpro1021",
            storageBucket: "vortexpro1021.firebasestorage.app",
            messagingSenderId: "403000271858",
            appId: "1:403000271858:web:7a8716548ee0a1b822016b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. CAPTURA DE PREÇO
        document.getElementById('btnCapture').addEventListener('click', () => {
            const url = document.getElementById('productUrl').value;
            if(!url) return alert("Insira o link!");
            document.getElementById('btnCapture').innerText = "BUSCANDO...";
            
            setTimeout(() => {
                let precoReal = 18.88; // Simulação da API ScrapingBee
                document.getElementById('supplier').value = precoReal;
                document.getElementById('btnCapture').innerText = "CAPTURADO R$ " + precoReal;
                atualizarSugestao();
            }, 1200);
        });

        // 2. BUSCA DE CEP + LOCALIZAÇÃO (ViaCEP)
        document.getElementById('destCep').addEventListener('input', async (e) => {
            const cep = e.target.value.replace(/\D/g, '');
            if(cep.length === 8) {
                document.getElementById('locationBadge').innerText = "Localizando...";
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const data = await response.json();
                    
                    if(!data.erro) {
                        document.getElementById('locationBadge').innerText = `📍 ${data.localidade}, ${data.uf}`;
                        
                        // Lógica de Frete Automático
                        let freteEstimado = 15.90;
                        if(data.uf === 'SP') freteEstimado = 12.90;
                        if(['AM', 'PA', 'CE', 'BA'].includes(data.uf)) freteEstimado = 24.50;
                        
                        document.getElementById('shipping').value = freteEstimado.toFixed(2);
                        atualizarSugestao();
                    } else {
                        document.getElementById('locationBadge').innerText = "CEP não encontrado ❌";
                    }
                } catch (err) {
                    document.getElementById('locationBadge').innerText = "Erro ao buscar local.";
                }
            }
        });

        function atualizarSugestao() {
            const custo = parseFloat(document.getElementById('supplier').value) || 0;
            const frete = parseFloat(document.getElementById('shipping').value) || 0;
            if(custo > 0) {
                document.getElementById('sale').value = (custo + frete + 20).toFixed(2);
            }
        }

        // 3. ANÁLISE DE LUCRO
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            const s = parseFloat(document.getElementById('sale').value) || 0;
            const c = parseFloat(document.getElementById('supplier').value) || 0;
            const f = parseFloat(document.getElementById('shipping').value) || 0;
            const lucroVal = s - c - f - (s * 0.12);
            
            document.getElementById('resProfit').innerText = "R$ " + lucroVal.toFixed(2);
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucroVal > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        // 4. HISTÓRICO
        document.getElementById('saveHistoryBtn').addEventListener('click', () => {
            const data = {
                custo: document.getElementById('supplier').value,
                local: document.getElementById('locationBadge').innerText,
                venda: document.getElementById('sale').value,
                lucro: document.getElementById('resProfit').innerText,
                timestamp: Date.now()
            };
            db.collection("history").add(data).then(() => {
                alert("Salvo no histórico!");
                carregarHistorico();
            });
        });

        function carregarHistorico() {
            db.collection("history").orderBy("timestamp", "desc").limit(3).get().then((snap) => {
                const list = document.getElementById('historyList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const item = doc.data();
                    list.innerHTML += `<div class="history-item"><strong>Lucro: ${item.lucro}</strong><br><small>${item.local} | Venda: R$ ${item.venda}</small></div>`;
                });
            });
        }
        carregarHistorico();
    </script>
</body>
</html>
