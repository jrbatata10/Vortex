<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX PRO AI | OPERAÇÃO FINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050508; --card: rgba(15, 15, 25, 0.98); --primary: #7c3aed; --gold: #f59e0b; --green: #10b981; --cyan: #22d3ee; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px;
            overflow-x: hidden;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 800; color: #fff; margin: 20px 0; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary); }
        .screen { width: 100%; display: none; flex-direction: column; max-width: 380px; animation: fadeIn 0.3s ease-in; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(124, 58, 237, 0.3); width: 100%; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .label { font-size: 10px; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #2e2e45; background: #000; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-family: 'Space Grotesk'; text-transform: uppercase; transition: transform 0.1s active; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-miner { background: #fff; color: #000; margin-bottom: 15px; border: 1px solid #ccc; }
        #locDisplay { font-size: 13px; color: #777; margin: -10px 0 15px; font-weight: 700; }
        .loc-ok { color: var(--green) !important; }
        .result-value { font-family: 'Space Grotesk'; font-size: 42px; font-weight: 800; color: var(--green); text-align: center; margin: 10px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="logo">VORTEX PRO AI</div>

    <section id="screen-login" class="screen active">
        <div class="card">
            <span class="label">Operador Autorizado</span>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" id="btnLogin">ACESSAR TERMINAL</button>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div class="card" style="border-color: var(--gold); text-align: center; padding: 10px;">
            <div style="font-size: 18px; font-weight: 800; color: var(--gold);">PATENTE OURO 💎</div>
        </div>

        <div class="card">
            <span class="label">Link Fornecedor</span>
            <input type="url" id="productUrl" placeholder="Cole o link Shopee/Ali">
            <button class="btn btn-miner" id="btnExtract">⚡ ANALISAR PRODUTO</button>
            
            <span class="label">Logística (CEP)</span>
            <input type="text" id="destCep" placeholder="00000000" maxlength="8">
            <div id="locDisplay">Aguardando CEP...</div>

            <div style="grid-template-columns: 1fr 1fr; display: grid; gap: 10px;">
                <div><span class="label">Custo Fornec.</span><input type="text" id="supplier" placeholder="0,00"></div>
                <div><span class="label">Frete (R$)</span><input type="text" id="shipping" value="0,00" readonly style="opacity: 0.6;"></div>
            </div>

            <span class="label">Sugestão Elite</span>
            <input type="text" id="sale" style="border-color: var(--primary); color: var(--primary); font-weight: 800;">
            
            <button class="btn btn-primary" id="btnCalc">CALCULAR LUCRO REAL</button>
        </div>

        <div id="resultCard" class="card hidden" style="border-color: var(--green); text-align: center;">
            <span class="label" style="color: var(--green);">Margem Confirmada</span>
            <div id="resProfit" class="result-value">R$ 0,00</div>
        </div>
    </section>

    <script>
        // Configuração Firebase
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);

        // Elementos dos Botões (Blindagem de Escuta)
        const btnLogin = document.getElementById('btnLogin');
        const btnExtract = document.getElementById('btnExtract');
        const btnCalc = document.getElementById('btnCalc');
        const inputCep = document.getElementById('destCep');

        // 1. Ação de Login
        btnLogin.addEventListener('click', async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await firebase.auth().signInWithEmailAndPassword(e, p);
            } catch(err) { alert("Acesso Negado."); }
        });

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-app').style.display = 'flex';
            }
        });

        // 2. Ação de CEP (Nova Rota Direta)
        inputCep.addEventListener('input', async (e) => {
            const cep = e.target.value.replace(/\D/g, '');
            const display = document.getElementById('locDisplay');
            if(cep.length === 8) {
                display.innerText = "🔍 Localizando...";
                try {
                    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                    const d = await r.json();
                    const j = JSON.parse(d.contents);
                    if(j && !j.erro) {
                        display.innerHTML = `📍 ${j.localidade}, ${j.uf}`;
                        display.classList.add('loc-ok');
                        document.getElementById('shipping').value = (j.uf === 'SP' ? "12,90" : "24,50");
                        autoSuggest();
                    }
                } catch(err) { display.innerText = "📍 Conexão Regional Ativa"; }
            }
        });

        // 3. Ação de Mineração
        btnExtract.addEventListener('click', async () => {
            const url = document.getElementById('productUrl').value;
            if(!url) return;
            btnExtract.innerText = "MINERANDO...";
            try {
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true&wait=4000`);
                const html = await res.text();
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) {
                    document.getElementById('supplier').value = match[1];
                    autoSuggest();
                } else { alert("Preço protegido. Insira manualmente."); }
            } catch(e) { console.log("Erro de rede."); }
            finally { btnExtract.innerText = "⚡ ANALISAR PRODUTO"; }
        });

        function autoSuggest() {
            const c = parseFloat(document.getElementById('supplier').value.replace(',', '.')) || 0;
            const f = parseFloat(document.getElementById('shipping').value.replace(',', '.')) || 0;
            if(c > 0) document.getElementById('sale').value = ((c + f) * 1.35).toFixed(2).replace('.', ',');
        }

        // 4. Ação de Cálculo e Animação (Confetti)
        btnCalc.addEventListener('click', () => {
            const v = parseFloat(document.getElementById('sale').value.replace(',', '.')) || 0;
            const c = parseFloat(document.getElementById('supplier').value.replace(',', '.')) || 0;
            const f = parseFloat(document.getElementById('shipping').value.replace(',', '.')) || 0;
            const lucro = v - c - f - (v * 0.12);
            
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            
            if(lucro > 0) {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#7c3aed', '#10b981', '#f59e0b']
                });
            }
        });
    </script>
</body>
</html>
