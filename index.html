<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>VORTEX PRO AI | SUPREME</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020205; --card: rgba(10, 10, 25, .98); --primary: #7c3aed; --gold: #fbbf24; --green: #10b981; --cyan: #06b6d4; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
        body { font-family:'Rajdhani', sans-serif; background:var(--bg); color:#fff; min-height:100vh; overflow-x:hidden; position: relative; }
        .aurora { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; background:radial-gradient(circle at 20% 20%, rgba(124, 58, 237, .2) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(6, 182, 212, .15) 0%, transparent 40%); animation:auroraMove 20s infinite; }
        .grid-bg { position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px); background-size:30px 30px; z-index:-1; }
        .container { max-width:420px; margin: 0 auto; padding:15px; position: relative; }
        .logo { font-family:'Orbitron', sans-serif; font-size:24px; font-weight:900; text-align:center; margin:20px 0; text-shadow:0 0 10px var(--primary); letter-spacing: 2px; }
        .card { background:var(--card); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 15px; padding: 18px; margin-bottom: 15px; backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .label { font-size:10px; color:var(--cyan); font-weight:700; text-transform:uppercase; margin-bottom:8px; display:block; font-family:'Orbitron'; }
        input { width:100%; padding:14px; margin-bottom:12px; border-radius:10px; border: 1px solid #1e1e30; background:rgba(0,0,0,0.8); color:#fff; font-size:16px; outline: none; }
        .btn { width:100%; padding:16px; border-radius:12px; border:none; font-weight:800; cursor:pointer; text-transform:uppercase; font-family:'Orbitron'; display:flex; align-items:center; justify-content:center; gap:10px; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-gold { background:var(--gold); color:#000; margin-top:10px; }
        .ai-status { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 10px; font-weight: 900; margin-bottom: 15px; padding: 8px; border-radius: 50px; border: 1px solid currentColor; text-transform: uppercase; }
        #rankBadge { padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: 900; margin-bottom: 10px; display: inline-block; font-family: 'Orbitron'; background: #cd7f32; color: #fff; }
        .hidden { display:none !important; }
        #locDisplay { font-size: 12px; color: var(--green); margin:-8px 0 12px; font-weight: 700; padding: 10px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; }
        .result-value { font-size:32px; color:var(--green); font-family:'Orbitron'; font-weight: 900; }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="logo">VORTEX <span>PRO</span> AI</div>

        <section id="screen-auth">
            <div id="auth-box" class="card">
                <span class="label" id="auth-title">Acesso Operador</span>
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="pass" placeholder="Senha">
                <button class="btn btn-primary" id="btn-auth" onclick="handleAuth()">🔐 ENTRAR NO TERMINAL</button>
                <div style="text-align:center; font-size:11px; margin-top:15px; color:var(--cyan); text-decoration:underline; font-weight: 700; cursor: pointer;" onclick="toggleRegister()" id="toggle-text">NÃO TEM CONTA? CADASTRE-SE</div>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div id="aiIndicator" class="ai-status" style="color:#ef4444; background:rgba(239, 68, 68, 0.1);"><span>IA Desconectada</span></div>
            <div class="card" style="text-align: center;"><div id="rankBadge">BRONZE</div></div>
            <div class="card">
                <span class="label">Scanner de Fornecedor</span>
                <input type="url" id="productUrl" placeholder="Link Shopee/AliExpress">
                <button class="btn btn-primary" id="btnMiner" onclick="scanAI()">⚡ LER COM GEMINI AI</button>
                <span class="label" style="margin-top:15px">Logística (CEP)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="buscaCep(this)">
                <div id="locDisplay">Aguardando CEP...</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><span class="label">Custo</span><input type="text" id="custo" placeholder="0,00" oninput="recalc()"></div>
                    <div><span class="label">Frete</span><input type="text" id="frete" value="0,00" readonly style="color:var(--cyan);"></div>
                </div>
                <span class="label">Sugestão (45% Margem)</span>
                <input type="text" id="venda" style="color:var(--gold); font-weight:900;" readonly>
                <button class="btn btn-gold" onclick="finalLucro()">🚀 VER LUCRO REAL</button>
            </div>
            <div id="resCard" class="card hidden" style="text-align:center">
                <div id="lucroFinal" class="result-value">R$ 0,00</div>
                <button class="btn" style="background:#25d366; color:#fff; margin-top:15px;" onclick="window.open('https://wa.me/5511975473066')">💬 SUPORTE VIP</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:rgba(255,255,255,0.2); width:100%; font-size:10px; margin:20px 0; font-weight: 700;">SAIR / RECARREGAR</button>
        </section>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/genai";
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const G_KEY = "AIzaSyD6j7gGPQAAJ9H7rI8ot1AAWkjloE4mp_M";
        let isRegister = false;
        let userRank = "BRONZE";

        window.toggleRegister = () => {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? "Criar Conta Bronze" : "Acesso Operador";
            document.getElementById('btn-auth').innerText = isRegister ? "💎 CADASTRAR" : "🔐 ENTRAR";
            document.getElementById('toggle-text').innerText = isRegister ? "JÁ TEM CONTA? LOGIN" : "NÃO TEM CONTA? CADASTRE-SE";
        };

        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            const btn = document.getElementById('btn-auth');
            if(!e || !p) return alert("Preencha todos os campos!");
            btn.innerText = "PROCESSANDO...";
            try {
                if(isRegister) {
                    const c = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection("users").doc(c.user.uid).set({ patente: "BRONZE" });
                    alert("Conta criada! Faça login agora.");
                    location.reload();
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch(err) { 
                btn.innerText = isRegister ? "💎 CADASTRAR" : "🔐 ENTRAR";
                alert("ERRO: Ative o 'Email/Password' no console do Firebase ou verifique sua internet."); 
            }
        };

        auth.onAuthStateChanged(async u => {
            if(u) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                if(G_KEY) {
                    document.getElementById('aiIndicator').style.color = "#10b981";
                    document.getElementById('aiIndicator').style.background = "rgba(16, 185, 129, 0.1)";
                    document.getElementById('aiIndicator').innerHTML = "<span>IA Conectada ✅</span>";
                }
                const doc = await db.collection("users").doc(u.uid).get();
                if(doc.exists) {
                    userRank = doc.data().patente || "BRONZE";
                    const badge = document.getElementById('rankBadge');
                    badge.innerText = userRank;
                    badge.style.background = userRank === "OURO" ? "#fbbf24" : "#cd7f32";
                    badge.style.color = userRank === "OURO" ? "#000" : "#fff";
                }
            }
        });

        window.scanAI = async () => {
            if(userRank === "BRONZE") return alert("Apenas membros OURO podem usar o Scanner!");
            const url = document.getElementById('productUrl').value;
            if(!url) return alert("Cole o link!");
            const btn = document.getElementById('btnMiner');
            btn.innerText = "⛏️ MINERANDO...";
            try {
                const genAI = new GoogleGenerativeAI(G_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const proxy = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await proxy.json();
                const result = await model.generateContent(`Extraia apenas o valor numérico em R$ deste texto: ${data.contents.substring(0, 2000)}`);
                const price = result.response.text().replace(/[^0-9.]/g, '');
                document.getElementById('custo').value = parseFloat(price).toFixed(2).replace('.', ',');
                recalc();
            } catch(e) { alert("IA ocupada. Insira o custo manual."); } finally { btn.innerText = "⚡ LER COM GEMINI AI"; }
        };

        window.buscaCep = async (el) => {
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                try {
                    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const j = await r.json();
                    if(!j.erro) {
                        document.getElementById('locDisplay').innerText = `📍 ${j.localidade}/${j.uf} ✅`;
                        const f = { SP: "12,90", RJ: "15,80", BA: "21,50", MG: "18,90" };
                        document.getElementById('frete').value = (f[j.uf] || "23,80").replace('.',',');
                        recalc();
                    }
                } catch(e) {}
            }
        };

        const n = (v) => parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0;
        window.recalc = () => {
            const c = n(document.getElementById('custo').value), f = n(document.getElementById('frete').value);
            if(c > 0) document.getElementById('venda').value = ((c + f) * 1.45).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        };

        window.finalLucro = () => {
            const v = n(document.getElementById('venda').value), c = n(document.getElementById('custo').value), f = n(document.getElementById('frete').value);
            const lucro = v - c - f - (v * 0.12);
            document.getElementById('lucroFinal').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
        };
    </script>
</body>
</html>
