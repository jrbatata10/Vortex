<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vortex Pro | Painel Administrativo</title>
                <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
                    <style>
                            :root {
                                        --bg: #060608; --card: #111116;
                                                    --primary: #8b5cf6; --accent: #f43f5e;
                                                                --money: #10b981; --cyan: #06b6d4;
                                                                        }
                                                                                body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
                                                                                        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
                                                                                                .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
                                                                                                        .btn-main { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
                                                                                                                .value-money { color: var(--money); font-size: 26px; font-weight: 800; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
                                                                                                                        input { width: 100%; padding: 16px; background: #000; border: 2px solid #222; color: #fff; border-radius: 16px; box-sizing: border-box; margin: 10px 0; font-weight: 600; }
                                                                                                                                
                                                                                                                                        #welcomeModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
                                                                                                                                                .modal-content { width: 85%; max-width: 350px; text-align: center; border: 2px solid var(--primary); box-shadow: 0 0 50px rgba(139, 92, 246, 0.5); }

                                                                                                                                                        #app { display: none; }
                                                                                                                                                            </style>
                                                                                                                                                            </head>
                                                                                                                                                            <body>

                                                                                                                                                                <div id="welcomeModal">
                                                                                                                                                                        <div class="card modal-content">
                                                                                                                                                                                    <h1 style="color: var(--primary); margin-top: 0; letter-spacing: -1px;">BEM-VINDO, BATATA!</h1>
                                                                                                                                                                                                <p style="font-weight: 700; line-height: 1.5;">Sua conta <b>ADMINISTRADOR VORTEX PRO</b> foi ativada com sucesso.</p>
                                                                                                                                                                                                            <div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 15px; margin: 20px 0;">
                                                                                                                                                                                                                            <span style="color: var(--money); font-weight: 800; font-size: 14px;">STATUS: NÍVEL GOLD (7% TAXA)</span>
                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                    <button class="btn-main" onclick="fecharModal()">ACESSAR MEU PAINEL</button>
                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                    <div id="login" class="container" style="padding-top: 60px;">
                                                                                                                                                                                                                                                                            <div style="text-align: center; margin-bottom: 40px;">
                                                                                                                                                                                                                                                                                        <h1 style="font-size: 40px; margin: 0; letter-spacing: -2px;">VORTEX<span style="color:var(--primary)"> PRO</span></h1>
                                                                                                                                                                                                                                                                                                    <p style="color: #666; font-weight: 700; letter-spacing: 2px;">AUTOMATION SYSTEM</p>
                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                                                                                                <input type="email" id="emailInput" placeholder="E-mail de Acesso">
                                                                                                                                                                                                                                                                                                                                            <input type="password" placeholder="Sua Senha">
                                                                                                                                                                                                                                                                                                                                                        <button class="btn-main" onclick="entrar()">Entrar no Painel</button>
                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                        <div id="app" class="container">
                                                                                                                                                                                                                                                                                                                                                                                <div class="card" style="border-left: 4px solid var(--primary); background: linear-gradient(to right, #111116, #060608);">
                                                                                                                                                                                                                                                                                                                                                                                            <div style="display: flex; justify-content: space-between;">
                                                                                                                                                                                                                                                                                                                                                                                                            <span style="background: #f59e0b; color: #000; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 10px;">LEVEL GOLD</span>
                                                                                                                                                                                                                                                                                                                                                                                                                            <span style="color: var(--money); font-weight: 800; font-size: 11px;">MODO ADMIN ●</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2 style="margin: 15px 0 5px 0;">Olá, Batata!</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p style="font-size: 11px; color: #888;">ID Oficial: <b>#001-ADMIN</b></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h4 style="margin: 0 0 10px 0; color: var(--primary);">⚡ EXECUTOR VORTEX PRO</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="text" id="linkProd" placeholder="Cole o link do produto aqui...">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="btn-main" onclick="processar()">GERAR LUCRO AGORA</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="card" style="margin: 0;"><p style="font-size: 10px; color: #888; margin: 0;">MEU SALDO</p><div class="value-money">R$ 1.250,00</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="card" style="margin: 0;"><p style="font-size: 10px; color: #888; margin: 0;">TAXA FIXA (7%)</p><div class="value-money" style="color: var(--primary);">R$ 87,50</div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="card" style="margin-top: 20px; border: 1px solid rgba(16, 185, 129, 0.2);">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h4 style="margin: 0 0 10px 0; color: var(--money);">🏦 RETIRADA VIA PIX</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" placeholder="Sua Chave PIX">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="btn-main" style="background: var(--money); color: #000;" onclick="alert('Saque de R$ 1.250,00 solicitado para Batata!')">SOLICITAR SAQUE</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function entrar() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('login').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('welcomeModal').style.display = 'flex';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function fecharModal() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('welcomeModal').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('app').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function processar() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const btn = document.querySelector('.btn-main');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                btn.innerText = "CALCULANDO COMISSÃO...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(() => { btn.innerText = "LUCRO GERADO!"; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(() => { btn.innerText = "GERAR LUCRO AGORA"; }, 2000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 1500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
