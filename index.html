<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX PRO AI | Elite Operations</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #050508; --card: rgba(10, 10, 20, 0.85); --primary: #8b5cf6;
            --gold: #fbbf24; --green: #34d399; --cyan: #22d3ee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; }

        .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.3) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.2) 0%, transparent 50%); animation: auroraMove 20s infinite; }
        @keyframes auroraMove { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -20px); } }

        .container { max-width: 420px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }

        .card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .label { font-size: 11px; color: var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        input { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; font-size: 16px; }
        
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #000; margin-top: 10px; }
        .scanner-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: white; margin-bottom: 15px; }

        #locDisplay { font-size: 13px; color: var(--green); font-weight: 700; margin-top: -10px; margin-bottom: 20px; background: rgba(52, 211, 153, 0.1); padding: 10px; border-radius: 12px; }
        .result-value { font-family: 'Space Grotesk'; font-size: 48px; font-weight: 800; color: var(--green); text-align: center; }
        .hidden { display: none !important; }
        .nuvem-banner { background: #0046ff; padding: 15px; border-radius: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="container">
        <div class="logo">VORTEX PRO AI</div>

        <section id="screen-login">
            <div class="card">
                <span class="label">Operador Autorizado</span>
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleAuth()">🔐 ACESSAR TERMINAL</button>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div class="card" style="text-align: center; border-color: var(--gold);">
                <span style="color: var(--gold); font-weight: 800;">STATUS: OURO 💎</span>
            </div>

            <div class="card">
                <span class="label">🔍 Scanner Neural</span>
                <input type="url" id="productUrl" placeholder="Link Shopee ou AliExpress">
                <button class="btn scanner-btn" id="btnExtract" onclick="capturePrice()">⚡ INICIAR MINERAÇÃO</button>
                
                <span class="label">📍 Inteligência Logística</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)">
                <div id="locDisplay">Aguardando CEP...</div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><span class="label">💰 Custo</span><input type="text" id="supplier" placeholder="0,00" oninput="atualizarSugestao()"></div>
                    <div><span class="label">🚚 Frete</span><input type="text" id="shipping" value="0,00" readonly style="opacity: 0.6;"></div>
                </div>

                <button class="btn btn-gold" onclick="calcular()">🚀 CALCULAR LUCRO</button>
            </div>

            <div id="resultCard" class="card hidden">
                <div id="resProfit" class="result-value">R$ 0,00</div>
                <div class="nuvem-banner" onclick="window.open('https://www.nuvemshop.com.br/partners/vrtex-pro')">
                    <span>🏢</span>
                    <div style="text-align: left; font-size: 12px;"><b>NUVEMSHOP</b><br>Escalar Operação</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert("Acesso Negado."); }
        }

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
            }
        });

        // SOLUÇÃO REAL PARA O CEP (FURA O BLOQUEIO DE SINAL)
        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                display.innerText = "🔍 Sincronizando rota...";
                try {
                    // Usando o túnel AllOrigins para ignorar o bloqueio CORS do navegador
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://viacep.com.br/ws/${cep}/json/`)}`);
                    const data = await res.json();
                    const json = JSON.parse(data.contents);
                    if(!json.erro) {
                        display.innerHTML = `📍 ${json.localidade}, ${json.uf}`;
                        document.getElementById('shipping').value = (json.uf === 'SP' ? "12,90" : "22,50");
                    }
                } catch(e) { display.innerText = "📍 Conexão Regional Ativa"; document.getElementById('shipping').value = "19,90"; }
                atualizarSugestao();
            }
        }

        function n(v) { return parseFloat(v.toString().replace(',', '.')) || 0; }
        function atualizarSugestao() { /* Lógica de sugestão opcional */ }

        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnExtract');
            if(!url) return;
            btn.innerText = "MINERANDO...";
            try {
                // ScrapingBee com JS Render para "furar" a proteção da Shopee
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true`);
                const html = await res.text();
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) { document.getElementById('supplier').value = match[1]; }
            } catch (e) { alert("Site protegido. Digite o valor manualmente."); } finally { btn.innerText = "⚡ INICIAR MINERAÇÃO"; }
        }

        function calcular() {
            const s = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            const lucro = (s * 1.35) - s - f - ((s * 1.35) * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }
    </script>
</body>
</html>
