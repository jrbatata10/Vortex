<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vortex Pro | Dashboard</title>
                <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
                    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
                        <style>
                                :root { --primary: #00f2ff; --bg: #030303; --gold: #ffd700; }
                                        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
                                                .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
                                                        .badge-gold { background: var(--gold); color: #000; padding: 5px 10px; border-radius: 10px; font-weight: bold; font-size: 12px; }
                                                                .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
                                                                        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
                                                                                #app { display: none; }
                                                                                    </style>
                                                                                    </head>
                                                                                    <body>

                                                                                        <div id="login-screen" class="glass" style="max-width: 350px; margin: 50px auto; text-align: center;">
                                                                                                <h2>Acessar Vortex Pro</h2>
                                                                                                        <input type="email" id="email" placeholder="Seu e-mail">
                                                                                                                <input type="password" id="password" placeholder="Sua senha">
                                                                                                                        <button class="btn" onclick="login()">ENTRAR NO PAINEL</button>
                                                                                                                            </div>

                                                                                                                                <div id="app">
                                                                                                                                        <div class="glass">
                                                                                                                                                    <span class="badge-gold">Nível Gold</span>
                                                                                                                                                                <h3>Bem-vindo, Batata!</h3>
                                                                                                                                                                            <p>Sua taxa atual: <strong>7% por venda</strong></p>
                                                                                                                                                                                    </div>
                                                                                                                                                                                            
                                                                                                                                                                                                    <div class="glass">
                                                                                                                                                                                                                <h4>🚀 Automação Vortex</h4>
                                                                                                                                                                                                                            <input type="text" placeholder="Cole o link do produto aqui...">
                                                                                                                                                                                                                                        <button class="btn">EXECUTAR VORTEX</button>
                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                // Suas chaves do Firebase aplicadas automaticamente
                                                                                                                                                                                                                                                                        const firebaseConfig = {
                                                                                                                                                                                                                                                                                    apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-10b...",
                                                                                                                                                                                                                                                                                                authDomain: "vortexpro1021.firebaseapp.com",
                                                                                                                                                                                                                                                                                                            projectId: "vortexpro1021",
                                                                                                                                                                                                                                                                                                                        storageBucket: "vortexpro1021.firebasestorage.app",
                                                                                                                                                                                                                                                                                                                                    messagingSenderId: "403000271858",
                                                                                                                                                                                                                                                                                                                                                appId: "1:403000271858:web:7a8716548ee0a1b8..."
                                                                                                                                                                                                                                                                                                                                                        };
                                                                                                                                                                                                                                                                                                                                                                firebase.initializeApp(firebaseConfig);

                                                                                                                                                                                                                                                                                                                                                                        function login() {
                                                                                                                                                                                                                                                                                                                                                                                    // Lógica simplificada para você visualizar agora
                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('login-screen').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('app').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
