<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO AI | Elite Operations</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #030305; --card: #080811; --primary: #7c3aed; 
            --gold: #f59e0b; --green: #10b981; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg); color: #fff; 
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #030305 75%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 30px 0; }
        .screen { width: 100%; display: none; flex-direction: column; max-width: 400px; animation: slideUp 0.4s ease; }
        .active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(124, 58, 237, 0.2); width: 100%; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .label { font-size: 11px; color: #6366f1; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1e1e30; background: #000; color: #fff; font-size: 16px; font-family: 'Space Grotesk'; transition: 0.3s; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Space Grotesk'; text-transform: uppercase; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }
        .btn-extract { background: #fff; color: #000; margin-bottom: 12px; }
        #rankCard { border-color: var(--gold); background: rgba(245, 158, 11, 0.05); text-align: center; }
        #locDisplay { font-size: 12px; color: var(--green); font-weight: 700; margin-top: -10px; margin-bottom: 15px; min-height: 18px; }
        .result-value { font-family: 'Space Grotesk'; font-size: 42px; font-weight: 700; color: var(--green); text-align: center; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="logo">VORTEX PRO AI</div>

    <section id="screen-login" class="screen active">
        <div class="card">
            <span class="label">Operador Autorizado</span>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" onclick="handleAuth()">ENTRAR NO TERMINAL</button>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div id="rankCard" class="card">
            <span id="rankLabel" style="color: var(--gold); font-weight: 700; font-family: 'Space Grotesk';">PATENTE: OURO 💎</span>
        </div>

        <div class="card">
            <span class="label">Scanner de Fornecedor</span>
            <input type="url" id="productUrl" placeholder="Link Shopee/AliExpress">
            <button class="btn btn-extract" id="btnExtract" onclick="capturePrice()">INICIAR MINERAÇÃO</button>
            
            <span class="label" style="margin-top: 10px;">Logística Regional (CEP)</span>
            <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)">
            <div id="locDisplay"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div><span class="label">Custo Unit.</span><input type="text" id="supplier" placeholder="0,00" oninput="atualizarSugestao()"></div>
                <div><span class="label">Frete (R$)</span><input type="text" id="shipping" value="0,00" readonly style="opacity: 0.6;"></div>
            </div>

            <span class="label">Preço Sugerido para Elite</span>
            <input type="text" id="sale" style="border-color: var(--primary); color: var(--primary); font-size: 20px;">
            
            <button class="btn btn-primary" onclick="calcular()">CALCULAR MARGEM LÍQUIDA</button>
        </div>

        <div id="resultCard" class="card hidden" style="border-color: var(--green);">
            <span class="label" style="text-align: center; color: var(--green);">Lucro por Venda</span>
            <div id="resProfit" class="result-value">R$ 0,00</div>
        </div>
    </section>

    <script>
        // CONFIGURAÇÕES FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", 
            authDomain: "vortexpro1021.firebaseapp.com", 
            projectId: "vortexpro1021", 
            storageBucket: "vortexpro1021.firebasestorage.app", 
            messagingSenderId: "403000271858", 
            appId: "1:403000271858:web:7a8716548ee0a1b822016b" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { 
                await firebase.auth().signInWithEmailAndPassword(e, p); 
            } catch(err) { 
                alert("Acesso Negado."); 
            }
        }

        firebase.auth().onAuthStateChanged(async (user) => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                const patente = doc.exists ? (doc.data().patente || "OURO") : "OURO";
                document.getElementById('rankLabel').innerText = `STATUS: ${patente} 💎`;
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-app').style.display = 'flex';
            }
        });

        // FUNÇÃO DE CEP (MÉTODO FETCH DIRETO)
        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                display.innerText = "🔍 Localizando...";
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(response => response.json())
                    .then(data => {
                        if(!data.erro) {
                            display.innerHTML = `📍 ${data.localidade} - ${data.uf}`;
                            const valorFrete = (data.uf === 'SP' ? "12,90" : "22,50");
                            document.getElementById('shipping').value = valorFrete;
                            atualizarSugestao();
                        } else {
                            display.innerText = "❌ CEP não encontrado";
                        }
                    })
                    .catch(() => {
                        display.innerText = "⚠️ Erro de conexão";
                    });
            }
        }

        function n(v) { return parseFloat(v.toString().replace(',', '.')) || 0; }
        
        function atualizarSugestao() {
            const c = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            if(c > 0) {
                document.getElementById('sale').value = ((c + f) * 1.33).toFixed(2).replace('.', ',');
            }
        }

        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnExtract');
            if(!url) return;
            btn.innerText = "Minerando...";
            try {
                const res = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=DFAK7P4M6H3Z015E9RLG&url=${encodeURIComponent(url)}&render_js=true&premium_proxy=true`);
                const html = await res.text();
                const match = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/);
                if(match) {
                    document.getElementById('supplier').value = match[1];
                    atualizarSugestao();
                } else { 
                    alert("Preço não detectado. Digite manualmente."); 
                }
            } catch (e) { 
                alert("Sinal instável."); 
            } finally { 
                btn.innerText = "INICIAR MINERAÇÃO"; 
            }
        }

        function calcular() {
            const v = n(document.getElementById('sale').value);
            const c = n(document.getElementById('supplier').value);
            const f = n(document.getElementById('shipping').value);
            const lucro = v - c - f - (v * 0.12);
            document.getElementById('resProfit').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resProfit').style.color = lucro > 0 ? 'var(--green)' : 'var(--red)';
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
            }
        }

        function logout() { 
            firebase.auth().signOut().then(() => window.location.reload()); 
        }
    </script>
</body>
</html>
