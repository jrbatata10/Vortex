<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO AI | Elite Access</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #020205; --card: #0a0a12; --primary: #8b5cf6; 
            --gold: #ffd700; --green: #00ff88; --red: #ff4444;
            --grad: linear-gradient(90deg, #8b5cf6 0%, #ec4899 100%); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Rajdhani', sans-serif; /* Fonte séria para o corpo */
            background: var(--bg); 
            color: #fff; 
            background-image: radial-gradient(circle at 50% -20%, #251052 0%, #020205 60%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* LOGO ANIMADO */
        .vortex-logo {
            width: 70px;
            height: 70px;
            margin: 30px 0;
            background: linear-gradient(45deg, #251052, #020205);
            border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .vortex-logo::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, var(--primary) 0deg, transparent 60deg, var(--grad) 180deg, transparent 240deg, var(--primary) 360deg);
            animation: rotateVortex 4s linear infinite;
        }
        .vortex-logo-v {
            font-family: 'Space Grotesk', sans-serif; /* Fonte geométrica para o 'V' */
            font-size: 30px;
            color: #fff;
            font-weight: 800;
            z-index: 10;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes rotateVortex { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .screen { width: 100%; display: none; flex-direction: column; align-items: center; padding: 20px; animation: fadeInUp 0.6s ease-out; }
        .active { display: flex; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); width: 100%; max-width: 400px; margin-bottom: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #1a1a2e; background: #000; color: #fff; outline: none; transition: 0.3s; font-weight: bold; }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Space Grotesk'; transition: 0.3s; margin-top: 5px; }
        .btn-primary { background: var(--grad); color: #fff; }
        .btn-extract { background: #fff; color: #000; margin-bottom: 15px; }
        
        .label-app { font-size: 10px; color: var(--primary); font-weight: 800; margin-bottom: 5px; display: block; letter-spacing: 1.5px; text-transform: uppercase; }
        .hidden { display: none; }
        #locDisplay { color: var(--green); font-size: 11px; font-weight: 700; margin-bottom: 10px; min-height: 16px; display: flex; align-items: center; gap: 5px; }

        /* ESTILO DOS ANÚNCIOS NUVEMSHOP */
        .ad-banner { 
            width: 100%; max-width: 400px; padding: 15px; border-radius: 16px; 
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: 0.3s; margin-top: 20px; border: 1px solid #0046ff;
            background: linear-gradient(45deg, #001a4d, #0a0a12);
        }
        .ad-banner:hover { transform: scale(1.02); }
        .nuvemshop-logo { font-size: 24px; }
    </style>
</head>
<body>

    <section id="screen-login" class="screen active" style="margin-top: 10vh;">
        <h1 style="font-family:'Space Grotesk'; margin-bottom: 30px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px; text-align: center;">VORTEX PRO</h1>
        <div class="card">
            <input type="email" id="email" placeholder="E-mail de acesso">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" onclick="handleAuth()">IDENTIFICAR OPERADOR</button>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div id="rankCard" class="card" style="border-color: var(--primary); text-align: center; padding: 15px; background: rgba(139, 92, 246, 0.05);">
            <div id="rankLabel" style="color:var(--primary); font-weight: 800; font-size: 16px;">PATENTE: BRONZE 🛡️</div>
        </div>

        <div class="card">
            <span class="label-app">MINERAÇÃO DE LINK</span>
            <input type="url" id="productUrl" placeholder="Link Shopee ou AliExpress">
            <button class="btn btn-extract" onclick="capturePrice()">EXTRAIR DADOS</button>
            
            <div style="margin-top: 15px;">
                <span class="label-app">LOGÍSTICA (CEP DO DESTINO)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)">
                <div id="locDisplay"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><span class="label-app">CUSTO FORN.</span><input type="number" id="supplier" placeholder="0.00" oninput="atualizarSugestao()"></div>
                <div><span class="label-app">FRETE (R$)</span><input type="number" id="shipping" value="0.00" readonly style="color: #666;"></div>
            </div>

            <span class="label-app">VALOR DE REVENDA SUGERIDO</span>
            <input type="number" id="sale" style="border-color: var(--primary); color: var(--primary); font-weight: bold;">
            
            <button class="btn btn-primary" onclick="calcular()">⚡ CALCULAR MARGEM REAL</button>
        </div>

        <div id="resultCard" class="card hidden" style="border: 2px solid var(--green); text-align: center;">
            <div style="font-size: 12px; color: #888;">LUCRO LÍQUIDO ESTIMADO:</div>
            <h2 id="resProfit" style="color:var(--green); font-size: 40px; font-family: 'Space Grotesk';">R$ 0,00</h2>
            
            <div class="ad-banner" onclick="window.open('https://www.nuvemshop.com.br/partners/vrtex-pro')">
                <div class="nuvemshop-logo">🏢</div>
                <div style="text-align: left;">
                    <div style="color: #00d2ff; font-size: 10px; font-weight: 800; letter-spacing: 1px;">PARCEIRO OFICIAL</div>
                    <div style="font-size: 13px; font-weight: bold;">Crie sua Loja Nuvemshop aqui</div>
                    <div style="font-size: 10px; color: var(--green); font-weight: bold;">[ Isenção de Mensalidade + Bônus ]</div>
                </div>
            </div>
        </div>

        <button onclick="logout()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; font-size: 11px;">ENCERRAR SESSÃO</button>
    </section>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Acesso negado."); }
        }

        auth.onAuthStateChanged(async (user) => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) {
                    const patente = doc.data().patente || "BRONZE";
                    document.getElementById('rankLabel').innerText = `PATENTE: ${patente} ${patente === 'OURO' ? '💎' : '🛡️'}`;
                    if(patente === "OURO") {
                        document.getElementById('rankCard').style.borderColor = "var(--gold)";
                        document.getElementById('rankCard').style.background = "rgba(255, 215, 0, 0.05)";
                        document.getElementById('rankLabel').style.color = "var(--gold)";
                    }
                }
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-app').style.display = 'flex';
            }
        });

        function logout() { auth.signOut(); window.location.reload(); }

        // UTILS
        function parseValue(val) {
            return parseFloat(val.toString().replace(',', '.')) || 0;
        }

        function atualizarSugestao() {
            const custo = parseValue(document.getElementById('supplier').value);
            const frete = parseValue(document.getElementById('shipping').value);
            if(custo > 0) {
                document.getElementById('sale').value = ((custo + frete) * 1.33).toFixed(2);
            }
        }

        // CEP API (CORS FIX)
        async function validarCEP(el) {
            const display = document.getElementById('locDisplay');
            if(el.value.length === 8) {
                display.innerText = "⏳ Localizando...";
                try {
                    const r = await fetch(`https://viacep.com.br/ws/${el.value}/json/`, { mode: 'cors' });
                    const d = await r.json();
                    if(!d.erro) {
                        display.innerHTML = `📍 ${d.localidade} - ${d.uf}`;
                        const valorFrete = (d.uf === 'SP' ? 12.90 : 22.50);
                        document.getElementById('shipping').value = valorFrete.toFixed(2);
                        atualizarSugestao();
                    } else { display.innerText = "❌ CEP não encontrado"; }
                } catch(e) { display.innerText = "⚠️ Erro de conexão"; }
            }
        }

        // SCRAPINGBEE (JavaScript Render Fix)
        async function capturePrice() {
            const urlLoja = document.getElementById('productUrl').value;
            const apiKey = "DFAK7P4M6H3Z015E9RLG"; 
            if(!urlLoja) return alert("Cole o link!");
            
            try {
                const response = await fetch(`https://app.scrapingbee.com/api/v1/?api_key=${apiKey}&url=${encodeURIComponent(urlLoja)}&render_js=true`);
                const html = await response.text();
                const priceMatch = html.match(/R\$\s?(\d{1,3}(?:\.\d{3})*,\d{2})/);
                
                if(priceMatch) {
                    const precoFinal = priceMatch[1].replace('.', '').replace(',', '.');
                    document.getElementById('supplier').value = parseFloat(precoFinal).toFixed(2);
                    atualizarSugestao();
                } else { alert("Preço não detectado. Digite manualmente."); }
            } catch (error) { alert("Servidor ocupado. Digite manualmente."); }
        }

        // CÁLCULO FINAL (NaN Fix)
        function calcular() {
            const venda = parseValue(document.getElementById('sale').value);
            const custo = parseValue(document.getElementById('supplier').value);
            const frete = parseValue(document.getElementById('shipping').value);
            const lucro = venda - custo - frete - (venda * 0.12);
            
            document.getElementById('resProfit').innerText = "R$ " + lucro.toFixed(2);
            document.getElementById('resProfit').style.color = lucro > 0 ? 'var(--green)' : 'var(--red)';
            document.getElementById('resultCard').classList.remove('hidden');
            if(lucro > 0) confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
        }
    </script>
</body>
</html>
