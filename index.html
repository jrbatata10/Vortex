<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX PRO | Lucro Estratégico</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #050508; --surface: #0f0f16; --primary: #8b5cf6; --gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f43f5e 100%); --money: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 420px; }
        .card { background: var(--surface); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        h1 { font-family: 'Space Grotesk'; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; font-size: 14px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 5px; }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-capture { background: #fff; color: #000; margin-bottom: 15px; }
        .hidden { display: none !important; }
        .label-tag { font-size: 10px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea" class="card">
            <h1>VORTEX PRO</h1>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn btn-primary" id="loginBtn">🚀 ACESSAR PORTAL</button>
        </div>

        <div id="appArea" class="hidden">
            <div class="card">
                <h2 id="userName" style="font-family:'Space Grotesk'; font-size: 20px;">Olá, Junior!</h2>
                <p style="font-size: 11px; color: #10b981;">Estratégia: Lucro Superior ao Afiliado ✅</p>
            </div>
            
            <div class="card">
                <span class="label-tag">Passo 1: Link do Produto</span>
                <input type="text" id="productUrl" placeholder="Cole o link da Shopee/Ali aqui...">
                <button class="btn btn-capture" id="captureBtn">🔍 CAPTURAR & PRECIFICAR</button>
                
                <span class="label-tag">Passo 2: Entrega</span>
                <input type="text" id="destCep" placeholder="CEP do Cliente">
                <button class="btn btn-primary" id="btnFrete">BUSCAR MELHOR FRETE</button>
            </div>

            <div class="card">
                <span class="label-tag">Valores da Operação</span>
                <p style="font-size: 10px; color: #666;">Custo do Produto:</p>
                <input type="number" id="supplier" placeholder="Custo (R$)">
                
                <p style="font-size: 10px; color: #666;">Frete Estimado:</p>
                <input type="number" id="shipping" placeholder="Frete (R$)">
                
                <p style="font-size: 10px; color: #8b5cf6; font-weight: bold;">Venda Sugerida (Mercado):</p>
                <input type="number" id="sale" placeholder="Preço de Venda (R$)" style="border: 1px solid var(--primary);">
                
                <button class="btn btn-primary" id="analyzeBtn">⚡ CALCULAR MEU LUCRO</button>
            </div>

            <div id="resultCard" class="card hidden" style="border: 2px solid var(--money); text-align: center;">
                <p style="color:#888;">Seu Ganho Líquido (Real):</p>
                <h2 id="resProfit" style="color:var(--money); font-size: 32px; margin: 10px 0;">R$ 0,00</h2>
                <button class="btn btn-primary" style="background:#25d366" onclick="window.open('https://wa.me/5511975473066')">FINALIZAR NO WHATSAPP</button>
            </div>
            <button class="btn" style="color: #444; font-size: 10px;" id="logoutBtn">SAIR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I",
            authDomain: "vortexpro1021.firebaseapp.com",
            projectId: "vortexpro1021",
            storageBucket: "vortexpro1021.firebasestorage.app",
            messagingSenderId: "403000271858",
            appId: "1:403000271858:web:7a8716548ee0a1b822016b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('captureBtn').addEventListener('click', () => {
            const url = document.getElementById('productUrl').value;
            if(!url) return alert("Cole o link!");
            document.getElementById('captureBtn').innerText = "ANALISANDO MERCADO...";
            
            setTimeout(() => {
                const custo = (Math.random() * (60 - 25) + 25); 
                // LOGICA DE PRECIFICAÇÃO: Custo + 45% (Para cobrir taxas e sobrar lucro real)
                const vendaSugerida = custo * 1.45; 
                
                document.getElementById('supplier').value = custo.toFixed(2);
                document.getElementById('sale').value = vendaSugerida.toFixed(2);
                document.getElementById('captureBtn').innerText = "SUGESTÃO PRONTA! ✅";
            }, 1200);
        });

        document.getElementById('btnFrete').addEventListener('click', () => {
            const cep = document.getElementById('destCep').value;
            if(cep.length < 8) return alert("CEP Inválido");
            document.getElementById('shipping').value = "15.00";
            document.getElementById('btnFrete').innerText = "FRETE CALCULADO! ✅";
        });

        document.getElementById('analyzeBtn').addEventListener('click', () => {
            const s = parseFloat(document.getElementById('sale').value) || 0;
            const c = parseFloat(document.getElementById('supplier').value) || 0;
            const f = parseFloat(document.getElementById('shipping').value) || 0;
            
            // Simula taxas de plataforma (12%) + reserva de segurança
            const taxas = s * 0.12;
            const lucro = s - c - f - taxas;
            
            document.getElementById('resProfit').innerText = "R$ " + lucro.toFixed(2);
            document.getElementById('resultCard').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('appArea').classList.remove('hidden');
            }
        });
        document.getElementById('loginBtn').addEventListener('click', () => {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value).catch(err => alert(err.message));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => location.reload()));
    </script>
</body>
</html>
