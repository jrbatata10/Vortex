<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>VORTEX PRO AI | SUPREME</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020205; --card: rgba(10, 10, 25, .98); --primary: #7c3aed; --gold: #fbbf24; --green: #10b981; --cyan: #06b6d4; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Rajdhani', sans-serif; background:var(--bg); color:#fff; min-height:100vh; }
        .container { max-width:420px; margin: 0 auto; padding:15px; }
        .logo { font-family:'Orbitron', sans-serif; font-size:24px; font-weight:900; text-align:center; margin:20px 0; text-shadow:0 0 10px var(--primary); }
        .card { background:var(--card); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 15px; padding: 18px; margin-bottom: 15px; }
        .label { font-size:10px; color:var(--cyan); font-weight:700; text-transform:uppercase; margin-bottom:8px; display:block; font-family:'Orbitron'; }
        input { width:100%; padding:14px; margin-bottom:12px; border-radius:10px; border: 1px solid #1e1e30; background:rgba(0,0,0,0.8); color:#fff; font-size:16px; outline: none; }
        .btn { width:100%; padding:16px; border-radius:12px; border:none; font-weight:800; cursor:pointer; text-transform:uppercase; font-family:'Orbitron'; display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-primary { background:var(--primary); color:#fff; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">VORTEX <span>PRO</span> AI</div>

        <section id="screen-auth">
            <div class="card">
                <span class="label" id="auth-title">Acesso Operador</span>
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleAuth()">🔐 ENTRAR NO TERMINAL</button>
                <div style="text-align:center; font-size:11px; margin-top:15px; color:var(--cyan); text-decoration:underline; cursor: pointer;" onclick="toggleRegister()">CADASTRE-SE</div>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div class="card" style="text-align: center;">
                <div style="color:var(--green); font-weight:900; font-family:'Orbitron'">SISTEMA LIBERADO ✅</div>
                <button class="btn btn-primary" style="margin-top:20px" onclick="location.reload()">SAIR</button>
            </div>
        </section>
    </div>

    <script>
        // Configurações Vortex Pro 1021
        const firebaseConfig = { 
            apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", 
            authDomain: "vortexpro1021.firebaseapp.com", 
            projectId: "vortexpro1021", 
            storageBucket: "vortexpro1021.firebasestorage.app", 
            messagingSenderId: "403000271858", 
            appId: "1:403000271858:web:7a8716548ee0a1b822016b" 
        };
        
        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isRegister = false;

        function toggleRegister() {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? "Ativar Acesso Bronze" : "Acesso Operador";
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;

            if(!e || !p) {
                alert("Preencha e-mail e senha!");
                return;
            }

            try {
                if(isRegister) {
                    const c = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection("users").doc(c.user.uid).set({ patente: "BRONZE" });
                    alert("Conta criada com sucesso! Agora clique em ENTRAR.");
                    location.reload();
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch(error) {
                console.error(error);
                alert("ERRO: " + error.message);
            }
        }

        // Monitor de Login
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
