<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>VORTEX PRO AI | SUPREME DASHBOARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020205; --card: rgba(10, 10, 25, .95); --primary: #7c3aed; --gold: #fbbf24; --green: #10b981; --cyan: #06b6d4; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
        body { font-family:'Rajdhani', sans-serif; background:var(--bg); color:#fff; min-height:100vh; overflow-x:hidden; position:relative; }
        .aurora { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; background:radial-gradient(circle at 20% 20%, rgba(124, 58, 237, .25) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(6, 182, 212, .2) 0%, transparent 40%); animation:auroraMove 20s infinite; }
        .grid-bg { position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px); background-size:30px 30px; z-index:-1; }
        .container { max-width:420px; margin: 0 auto; padding:20px; position:relative; }
        .logo { font-family:'Orbitron', sans-serif; font-size:26px; font-weight:900; text-align:center; margin:25px 0; text-shadow:0 0 15px var(--primary); letter-spacing:4px; color:#fff; }
        .logo span { color: var(--cyan); }
        .card { background:var(--card); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 20px; padding: 22px; margin-bottom: 20px; backdrop-filter: blur(25px); box-shadow:0 10px 40px rgba(0,0,0,0.6); position:relative; overflow:hidden; }
        .ai-status { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding: 5px; border-radius: 50px; }
        .ai-online { background: rgba(16, 185, 129, 0.1); color: var(--green); border: 1px solid var(--green); }
        .ai-offline { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .label { font-size:10px; color:var(--cyan); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; display:block; font-family:'Orbitron'; }
        input { width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border: 1px solid #1e1e30; background:rgba(0,0,0,0.7); color:#fff; font-size:16px; outline: none; }
        .btn { width:100%; padding:18px; border-radius:12px; border:none; font-weight:800; cursor:pointer; text-transform:uppercase; font-family:'Orbitron'; transition:0.3s; display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-gold { background:var(--gold); color:#000; margin-top:10px; }
        #rankBadge { padding: 6px 18px; border-radius: 50px; font-size: 12px; font-weight: 900; margin-bottom: 10px; display: inline-block; font-family: 'Orbitron'; }
        .rank-gold { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        .rank-bronze { background: #cd7f32; color: #fff; }
        .hidden { display:none!important; }
        .switch-auth { text-align: center; font-size: 11px; color: var(--cyan); margin-top: 15px; cursor: pointer; font-weight: 700; }
        #locDisplay { font-size: 13px; color: var(--green); margin:-10px 0 15px; font-weight: 700; padding: 12px; background: rgba(16, 185, 129, 0.1); border-radius: 10px; border-left: 4px solid var(--green); }
        .result-value { font-family:'Orbitron'; font-size:38px; color:var(--green); text-align:center; margin:15px 0; }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="logo">VORTEX<span>PRO</span> AI</div>

        <section id="screen-auth">
            <div id="auth-login" class="card">
                <span class="label">Operador Autorizado</span>
                <input type="email" id="login-email" placeholder="E-mail">
                <input type="password" id="login-pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleLogin()">🔐 ENTRAR</button>
                <div class="switch-auth" onclick="toggleAuth(true)">CRIAR CONTA BRONZE</div>
            </div>
            <div id="auth-register" class="card hidden">
                <span class="label">Ativar Bronze</span>
                <input type="email" id="reg-email" placeholder="E-mail">
                <input type="password" id="reg-pass" placeholder="Senha">
                <button class="btn btn-primary" onclick="handleRegister()">💎 ATIVAR</button>
                <div class="switch-auth" onclick="toggleAuth(false)">VOLTAR AO LOGIN</div>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div id="aiIndicator" class="ai-status ai-offline">
                <div class="dot"></div>
                <span id="aiText">IA Desconectada</span>
            </div>
            <div class="card" style="text-align: center;"><div id="rankBadge" class="rank-bronze">BRONZE</div></div>
            <div class="card">
                <span class="label">Scanner de Fornecedor</span>
                <input type="url" id="productUrl" placeholder="Link Shopee ou AliExpress">
                <button class="btn btn-primary" id="btnMiner" onclick="checkPermission()">⚡ LER PREÇO IA</button>
                <span class="label" style="margin-top:20px">Logística (CEP)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8" oninput="validarCEP(this)">
                <div id="locDisplay">Aguardando CEP...</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div><span class="label">Custo Unit.</span><input type="text" id="supplier" placeholder="0,00" oninput="calcSuggest()"></div>
                    <div><span class="label">Frete Real</span><input type="text" id="shipping" value="0,00" readonly style="color:var(--cyan)"></div>
                </div>
                <span class="label">Preço Sugerido (45% Margem Elite)</span>
                <input type="text" id="sale" style="border-color:var(--gold); color:var(--gold); font-weight:900" readonly>
                <button class="btn btn-gold" onclick="calcular()">🚀 CALCULAR LUCRO</button>
            </div>
            <div id="resultCard" class="card hidden">
                <div id="resProfit" class="result-value">R$ 0,00</div>
                <button class="btn" style="background:#25d366; color:#fff;" id="btnSupport">💬 SUPORTE VIP</button>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:rgba(255,255,255,0.1); width:100%; cursor:pointer; font-size:10px; margin-top:10px;">SAIR</button>
        </section>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/genai";
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userRank = "BRONZE", GEMINI_KEY = "";

        window.toggleAuth = (s) => { document.getElementById('auth-login').classList.toggle('hidden', s); document.getElementById('auth-register').classList.toggle('hidden', !s); }
        window.handleLogin = async () => { try { await firebase.auth().signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); } catch(e) { alert("Erro!"); } }
        window.handleRegister = async () => { try { const c = await firebase.auth().createUserWithEmailAndPassword(document.getElementById('reg-email').value, document.getElementById('reg-pass').value); await db.collection("users").doc(c.user.uid).set({ patente: "BRONZE" }); alert("Ativado!"); } catch(e) { alert("Erro!"); } }

        firebase.auth().onAuthStateChanged(async u => {
            if(u) {
                const d = await db.collection("users").doc(u.uid).get();
                if(d.exists) {
                    userRank = d.data().patente;
                    document.getElementById('rankBadge').innerText = userRank;
                    document.getElementById('rankBadge').className = userRank === "OURO" ? "rank-gold" : "rank-bronze";
                }
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                if(!GEMINI_KEY) { GEMINI_KEY = prompt("Insira a Chave Gemini (AIza...):"); if(GEMINI_KEY) { document.getElementById('aiIndicator').className = "ai-status ai-online"; document.getElementById('aiText').innerText = "IA Conectada"; } }
                document.getElementById('btnSupport').onclick = () => window.open(`https://wa.me/5511975473066?text=Suporte ${userRank}`);
            }
        });

        window.checkPermission = () => { (userRank === "BRONZE") ? alert("Apenas membros OURO!") : capturePrice(); }

        async function capturePrice() {
            const url = document.getElementById('productUrl').value;
            const btn = document.getElementById('btnMiner');
            if(!url || !GEMINI_KEY) return alert("Falta link ou chave!");
            btn.innerText = "🧠 ANALISANDO...";
            try {
                const genAI = new GoogleGenerativeAI(GEMINI_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const result = await model.generateContent(`Extraia apenas o valor numérico deste texto de produto em R$: ${data.contents.substring(0, 3000)}`);
                const p = result.response.text().replace(/[^0-9,.]/g, '').replace(',', '.');
                document.getElementById('supplier').value = parseFloat(p).toFixed(2).replace('.', ',');
                calcSuggest();
            } catch (e) { alert("Use o custo manual por enquanto."); } finally { btn.innerText = "⚡ LER PREÇO IA"; }
        }

        window.validarCEP = async (el) => {
            const cep = el.value.replace(/\D/g, '');
            if(cep.length === 8) {
                try {
                    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const j = await r.json();
                    if(!j.erro) {
                        document.getElementById('locDisplay').innerHTML = `📍 ${j.localidade}/${j.uf} ✅`;
                        const f = { SP: "12,90", RJ: "15,80", BA: "21,50", MG: "18,90" };
                        document.getElementById('shipping').value = (f[j.uf] || "23,80").replace('.',',');
                        calcSuggest();
                    }
                } catch(e) { document.getElementById('locDisplay').innerText = "Erro CEP"; }
            }
        }

        const n = (v) => parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0;
        window.calcSuggest = () => {
            const s = n(document.getElementById('supplier').value), f = n(document.getElementById('shipping').value);
            if(s > 0) document.getElementById('sale').value = ((s + f) * 1.45).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }
        window.calcular = () => {
            const v = n(document.getElementById('sale').value), s = n(document.getElementById('supplier').value), f = n(document.getElementById('shipping').value);
            document.getElementById('resProfit').innerText = "R$ " + (v - s - f - (v * 0.12)).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultCard').classList.remove('hidden');
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.8 } });
        }
        window.logout = () => firebase.auth().signOut().then(() => location.reload());
    </script>
</body>
</html>
