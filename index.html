<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>VORTEX PRO AI | SUPREME</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020205; --card: rgba(10, 10, 25, .98); --primary: #7c3aed; --gold: #fbbf24; --green: #10b981; --cyan: #06b6d4; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
        body { font-family:'Rajdhani', sans-serif; background:var(--bg); color:#fff; min-height:100vh; overflow-x:hidden; }
        
        /* Layout */
        .container { max-width:420px; margin: 0 auto; padding:15px; }
        .logo { font-family:'Orbitron', sans-serif; font-size:24px; font-weight:900; text-align:center; margin:20px 0; color: #fff; text-shadow:0 0 10px var(--primary); }
        .logo span { color: var(--cyan); }
        
        .card { background:var(--card); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .label { font-size:10px; color:var(--cyan); font-weight:700; text-transform:uppercase; margin-bottom:8px; display:block; font-family:'Orbitron'; }
        
        input { width:100%; padding:14px; margin-bottom:12px; border-radius:10px; border: 1px solid #1e1e30; background:rgba(0,0,0,0.8); color:#fff; font-size:16px; outline: none; }
        
        .btn { width:100%; padding:16px; border-radius:12px; border:none; font-weight:800; cursor:pointer; text-transform:uppercase; font-family:'Orbitron'; display:flex; align-items:center; justify-content:center; gap:10px; transition: 0.3s; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-gold { background:var(--gold); color:#000; margin-top:10px; }
        
        .ai-status { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 10px; font-weight: 900; margin-bottom: 15px; padding: 8px; border-radius: 50px; border: 1px solid currentColor; }
        
        #rankBadge { padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: 900; display: inline-block; font-family: 'Orbitron'; background: #cd7f32; color: #fff; }
        .hidden { display:none !important; }
        #locDisplay { font-size: 12px; color: var(--green); margin:-8px 0 12px; font-weight: 700; padding: 10px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; }
        .result-value { font-size:32px; color:var(--green); font-family:'Orbitron'; font-weight: 900; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">VORTEX <span>PRO</span> AI</div>

        <section id="screen-auth">
            <div class="card">
                <span class="label" id="auth-title">Acesso Operador</span>
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="pass" placeholder="Senha">
                <button class="btn btn-primary" id="btn-login">🔐 ENTRAR</button>
                <div id="btn-toggle-reg" style="text-align:center; font-size:11px; margin-top:15px; color:var(--cyan); text-decoration:underline; cursor:pointer;">CADASTRE-SE COMO BRONZE</div>
            </div>
        </section>

        <section id="screen-app" class="hidden">
            <div id="aiIndicator" class="ai-status" style="color:#ef4444; background:rgba(239,68,68,0.1);"><span>INTELIGÊNCIA ATIVA ✅</span></div>
            <div class="card" style="text-align: center;"><div id="rankBadge">BRONZE</div></div>
            
            <div class="card">
                <span class="label">Scanner de Fornecedor</span>
                <input type="url" id="productUrl" placeholder="Link Shopee ou AliExpress">
                <button class="btn btn-primary" id="btn-scan">⚡ LER PREÇO IA</button>
                
                <span class="label" style="margin-top:15px">Logística (CEP)</span>
                <input type="text" id="destCep" placeholder="00000000" maxlength="8">
                <div id="locDisplay">Aguardando CEP...</div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><span class="label">Custo</span><input type="text" id="custo" placeholder="0,00"></div>
                    <div><span class="label">Frete</span><input type="text" id="frete" value="0,00" readonly style="color:var(--cyan);"></div>
                </div>
                
                <span class="label">Venda Sugerida (45% Margem)</span>
                <input type="text" id="venda" style="color:var(--gold); font-weight:900;" readonly>
                <button class="btn btn-gold" id="btn-lucro">🚀 VER LUCRO REAL</button>
            </div>

            <div id="resCard" class="card hidden">
                <div id="lucroFinal" class="result-value">R$ 0,00</div>
                <button class="btn" style="background:#25d366; color:#fff;" id="btn-whatsapp">💬 SUPORTE VIP JUNIOR</button>
            </div>
            
            <button id="btn-logout" style="background:none; border:none; color:rgba(255,255,255,0.2); width:100%; font-size:10px; margin:20px 0; font-weight: 700;">SAIR DO SISTEMA</button>
        </section>
    </div>

    <script>
        // Configurações
        const G_KEY = "AIzaSyD6j7gGPQAAJ9H7rI8ot1AAWkjloE4mp_M";
        const firebaseConfig = { apiKey: "AIzaSyABtMG8ZU2BTEjV2e-WqD2HdX-1ObZ5y_I", authDomain: "vortexpro1021.firebaseapp.com", projectId: "vortexpro1021", storageBucket: "vortexpro1021.firebasestorage.app", messagingSenderId: "403000271858", appId: "1:403000271858:web:7a8716548ee0a1b822016b" };
        
        // Inicialização
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let isRegister = false;
        let userRank = "BRONZE";

        // Funções de Utilidade
        const n = (v) => parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0;
        const recalc = () => {
            const c = n(document.getElementById('custo').value), f = n(document.getElementById('frete').value);
            if(c > 0) document.getElementById('venda').value = ((c + f) * 1.45).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        };

        // Eventos de Interface (Garantia de Funcionamento em todos os modos)
        document.addEventListener('DOMContentLoaded', () => {

            // Botão Login/Cadastro
            document.getElementById('btn-login').addEventListener('click', async () => {
                const e = document.getElementById('email').value, p = document.getElementById('pass').value;
                if(!e || !p) return alert("Preencha os campos!");
                
                try {
                    if(isRegister) {
                        const c = await auth.createUserWithEmailAndPassword(e, p);
                        await db.collection("users").doc(c.user.uid).set({ patente: "BRONZE" });
                        alert("Conta criada! Faça login.");
                        location.reload();
                    } else {
                        await auth.signInWithEmailAndPassword(e, p);
                    }
                } catch(err) { alert("ERRO: Ative o 'Email/Password' no Firebase Console."); }
            });

            // Alternar entre Login e Cadastro
            document.getElementById('btn-toggle-reg').addEventListener('click', () => {
                isRegister = !isRegister;
                document.getElementById('auth-title').innerText = isRegister ? "Criar Conta Bronze" : "Acesso Operador";
                document.getElementById('btn-login').innerText = isRegister ? "💎 CADASTRAR" : "🔐 ENTRAR";
            });

            // Scanner IA
            document.getElementById('btn-scan').addEventListener('click', async () => {
                if(userRank === "BRONZE") return alert("Apenas membros OURO podem usar o Scanner!");
                const url = document.getElementById('productUrl').value;
                if(!url) return alert("Cole o link!");
                
                document.getElementById('btn-scan').innerText = "🧠 MINERANDO...";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Acesse o link ${url} e retorne APENAS o preço numérico. Ex: 45.90` }] }] })
                    });
                    const data = await response.json();
                    const p = data.candidates[0].content.parts[0].text.replace(/[^0-9.]/g, '');
                    document.getElementById('custo').value = parseFloat(p).toFixed(2).replace('.', ',');
                    recalc();
                } catch(e) { alert("Use custo manual."); } finally { document.getElementById('btn-scan').innerText = "⚡ LER PREÇO IA"; }
            });

            // Busca de CEP
            document.getElementById('destCep').addEventListener('input', async (e) => {
                const cep = e.target.value.replace(/\D/g, '');
                if(cep.length === 8) {
                    try {
                        const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                        const j = await r.json();
                        if(!j.erro) {
                            document.getElementById('locDisplay').innerText = `📍 ${j.localidade}/${j.uf} ✅`;
                            const f = { SP: "12,90", RJ: "15,80", BA: "21,50", MG: "18,90" };
                            document.getElementById('frete').value = (f[j.uf] || "23,80").replace('.',',');
                            recalc();
                        }
                    } catch(e) {}
                }
            });

            // Cálculo de Lucro
            document.getElementById('btn-lucro').addEventListener('click', () => {
                const v = n(document.getElementById('venda').value), c = n(document.getElementById('custo').value), f = n(document.getElementById('frete').value);
                document.getElementById('lucroFinal').innerText = "R$ " + (v - c - f - (v * 0.12)).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('resCard').classList.remove('hidden');
                confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
            });

            // Monitorar Mudanças de Custo
            document.getElementById('custo').addEventListener('input', recalc);

            // Suporte e Logout
            document.getElementById('btn-whatsapp').addEventListener('click', () => window.open('https://wa.me/5511975473066'));
            document.getElementById('btn-logout').addEventListener('click', () => auth.signOut().then(() => location.reload()));
        });

        // Monitorar Login
        auth.onAuthStateChanged(async u => {
            if(u) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-app').classList.remove('hidden');
                document.getElementById('aiIndicator').style.color = "#10b981";
                document.getElementById('aiIndicator').style.background = "rgba(16, 185, 129, 0.1)";
                const doc = await db.collection("users").doc(u.uid).get();
                if(doc.exists) {
                    userRank = doc.data().patente || "BRONZE";
                    const badge = document.getElementById('rankBadge');
                    badge.innerText = userRank;
                    badge.style.background = userRank === "OURO" ? "#fbbf24" : "#cd7f32";
                }
            }
        });
    </script>
</body>
</html>
